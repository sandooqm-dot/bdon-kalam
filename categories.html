<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>بدون كلام - الكتاغوريات</title>

  <style>
    @font-face{
      font-family:"Estedad";
      src:url("Estedad-Bold.ttf") format("truetype");
      font-style:normal;
      font-weight:700;
      font-display:swap;
    }

    :root{
      --bg:#083b73;
      --panel:#0e4a8a;
      --panel-2:#0b427c;
      --gold:#f4b512;
      --white:#f6f6f6;
      --green:#08c968;
      --black:#101010;

      --card-bg:#edf2ec;
      --selected:#dcebdc;
      --shadow-soft:0 6px 18px rgba(0,0,0,.18);

      /* =========================================================
         ========== تحكم عام بالعنوان الرئيسي "بدون كلام" ==========
         -p = عمودي
         -l = أفقي
         size = حجم الخط
         x = تحريك يمين/يسار
         y = تحريك أعلى/أسفل
         ========================================================= */
      --game-title-size-p: 82px;
      --game-title-x-p: 0px;
      --game-title-y-p: -15px;

      --game-title-size-l: 54px;
      --game-title-x-l: 0px;
      --game-title-y-l: -15px;

      /* =========================================================
         ========== تحكم بزر ابدأ اللعب ==========
         width  = عرض الزر
         height = ارتفاع الزر
         font   = حجم النص
         x/y    = تحريك الزر
         ========================================================= */
      --start-width-p: 250px;
      --start-height-p: 92px;
      --start-font-p: 50px;
      --start-x-p: -15px;
      --start-y-p: 0px;

      --start-width-l: 560px;
      --start-height-l: 54px;
      --start-font-l: 28px;
      --start-x-l: 0px;
      --start-y-l: 0px;

      /* =========================================================
         ========== تحكم بزر المنزل ==========
         size      = حجم الدائرة
         icon-size = حجم الأيقونة داخلها
         x/y       = تحريك الزر
         ========================================================= */
      --home-size-p: 60px;
      --home-icon-size-p: 26px;
      --home-x-p: -70px;
      --home-y-p: 20px;

      --home-size-l: 58px;
      --home-icon-size-l: 28px;
      --home-x-l: -90px;
      --home-y-l: 0px;

      /* =========================================================
         ========== تحكم بالصف السفلي (زر ابدأ + المنزل) ==========
         gap = المسافة بين الزرين
         x/y = تحريك الصف كاملًا
         ========================================================= */
      --actions-gap-p: 14px;
      --actions-x-p: 0px;
      --actions-y-p: 0px;

      --actions-gap-l: 10px;
      --actions-x-l: 0px;
      --actions-y-l: 0px;

      /* =========================================================
         ========== مكان التحكم الكامل بكل كتاغوري ==========
         p = Portrait  = الوضع العمودي
         l = Landscape = الوضع الأفقي

         card-h     = ارتفاع المربع
         img-h      = ارتفاع الصورة داخل المربع
         title-h    = ارتفاع منطقة العنوان
         title-size = حجم خط عنوان الكتاغوري
         title-y    = رفع/تنزيل عنوان الكتاغوري
         scale      = تكبير إضافي للصورة
         y          = رفع/تنزيل الصورة

         ملاحظات:
         - زيادة card-h = تكبير المربع
         - زيادة img-h  = تكبير الصورة
         - تقليل title-h = تقليل الفراغ بين النص والصورة
         - title-y: 10px ينزل النص تحت / -10px يرفع النص فوق
         - y: 10px تنزل الصورة تحت / -10px ترفع الصورة فوق
         ========================================================= */

      /* ===== حكم وأمثال ===== */
      --hkm-card-h-p: 210px;
      --hkm-img-h-p: 110px;
      --hkm-title-h-p: 46px;
      --hkm-title-size-p: 28px;
      --hkm-title-y-p: 0px;

      --hkm-card-h-l: 200px;
      --hkm-img-h-l: 100px;
      --hkm-title-h-l: 30px;
      --hkm-title-size-l: 35px;
      --hkm-title-y-l: 0px;

      --hkm-scale: 2.10;
      --hkm-y: 7px;

      /* ===== مسلسلات رمضانية ===== */
      --ram-card-h-p: 210px;
      --ram-img-h-p: 90px;
      --ram-title-h-p: 46px;
      --ram-title-size-p: 28px;
      --ram-title-y-p: 0px;

      --ram-card-h-l: 200px;
      --ram-img-h-l: 100px;
      --ram-title-h-l: 30px;
      --ram-title-size-l: 35px;
      --ram-title-y-l: 0px;

      --ram-scale: 2.50;
      --ram-y: 0px;

      /* ===== وظائف ومهن ===== */
      --job-card-h-p: 210px;
      --job-img-h-p: 110px;
      --job-title-h-p: 46px;
      --job-title-size-p: 28px;
      --job-title-y-p: 0px;

      --job-card-h-l: 200px;
      --job-img-h-l: 100px;
      --job-title-h-l: 30px;
      --job-title-size-l: 35px;
      --job-title-y-l: 0px;

      --job-scale: 2.35;
      --job-y: 7px;

      /* ===== أدوات المطبخ ===== */
      --kit-card-h-p: 210px;
      --kit-img-h-p: 110px;
      --kit-title-h-p: 46px;
      --kit-title-size-p: 28px;
      --kit-title-y-p: 0px;

      --kit-card-h-l: 200px;
      --kit-img-h-l: 100px;
      --kit-title-h-l: 30px;
      --kit-title-size-l: 35px;
      --kit-title-y-l: 0px;

      --kit-scale: 2.00;
      --kit-y: 7px;

      /* ===== أغاني ===== */
      --song-card-h-p: 210px;
      --song-img-h-p: 110px;
      --song-title-h-p: 46px;
      --song-title-size-p: 28px;
      --song-title-y-p: 0px;

      --song-card-h-l: 200px;
      --song-img-h-l: 100px;
      --song-title-h-l: 30px;
      --song-title-size-l: 35px;
      --song-title-y-l: 0px;

      --song-scale: 2.30;
      --song-y: 7px;

      /* ===== أماكن ومواقع ===== */
      --place-card-h-p: 210px;
      --place-img-h-p: 75px;
      --place-title-h-p: 46px;
      --place-title-size-p: 28px;
      --place-title-y-p: 0px;

      --place-card-h-l: 200px;
      --place-img-h-l: 80px;
      --place-title-h-l: 30px;
      --place-title-size-l: 35px;
      --place-title-y-l: 0px;

      --place-scale: 3.50;
      --place-y: 26px;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
      font-family:"Estedad", Tahoma, Arial, "Segoe UI", sans-serif;
    }

    html,body{
      margin:0;
      min-height:100%;
      background:var(--bg);
      color:var(--white);
    }

    body{
      min-height:100vh;
      overflow-x:hidden;
    }

    .page{
      position:relative;
      min-height:100vh;
      background:var(--bg);
      overflow:hidden;
      padding:14px 14px 110px;
    }

    .top-logo{
      position:absolute;
      top:12px;
      left:12px;
      z-index:5;
      user-select:none;
      pointer-events:none;
    }

    .top-logo img{
      width:min(128px, 24vw);
      height:auto;
      display:block;
    }

    .shell{
      width:min(100%, 980px);
      min-height:calc(100vh - 24px);
      margin:0 auto;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:18px;
      padding-top:96px;
      position:relative;
      z-index:2;
    }

    .title{
      margin:0;
      color:var(--gold);
      font-weight:700;
      line-height:1;
      text-align:center;
      letter-spacing:.2px;
      font-size:var(--game-title-size-p);
      transform:translate(var(--game-title-x-p), var(--game-title-y-p));
    }

    .board{
      width:min(100%, 760px);
      background:linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
      border:none;
      border-radius:34px;
      padding:18px 16px;
      box-shadow:var(--shadow-soft);
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:16px;
    }

    .cat{
      appearance:none;
      border:none;
      background:var(--card-bg);
      border:6px solid #000;
      border-radius:28px;
      box-shadow:0 8px 0 rgba(0,0,0,.28);
      cursor:pointer;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      gap:2px;
      transition:transform .12s ease, background .12s ease, border-color .12s ease, box-shadow .12s ease;
      padding:8px 8px 6px;
      height:var(--card-h);
    }

    .cat:active{
      transform:translateY(2px) scale(.99);
    }

    .cat.selected{
      background:var(--selected);
      border-color:var(--gold);
      box-shadow:0 0 0 4px rgba(244,181,18,.22), 0 8px 0 rgba(0,0,0,.28);
    }

    .cat-title{
      width:100%;
      text-align:center;
      color:#0f2540;
      font-weight:700;
      line-height:1.15;
      min-height:var(--title-h);
      display:flex;
      align-items:flex-start;
      justify-content:center;
      padding-top:4px;
      margin:0;
      font-size:var(--title-size);
      transform:translateY(var(--title-y));
    }

    .cat-visual{
      flex:1 1 auto;
      width:100%;
      min-height:0;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      padding:0;
    }

    .cat-visual img{
      width:auto;
      height:auto;
      max-width:82%;
      max-height:var(--img-h);
      object-fit:contain;
      display:block;
      pointer-events:none;
      user-select:none;
      transform-origin:center center;
      transform:translateY(var(--img-y)) scale(var(--img-scale));
    }

    /* ===== ربط كل كتاغوري بقيم العمودي ===== */
    .cat[data-key="hkm"]{
      --card-h: var(--hkm-card-h-p);
      --img-h: var(--hkm-img-h-p);
      --title-h: var(--hkm-title-h-p);
      --title-size: var(--hkm-title-size-p);
      --title-y: var(--hkm-title-y-p);
      --img-scale: var(--hkm-scale);
      --img-y: var(--hkm-y);
    }

    .cat[data-key="ram"]{
      --card-h: var(--ram-card-h-p);
      --img-h: var(--ram-img-h-p);
      --title-h: var(--ram-title-h-p);
      --title-size: var(--ram-title-size-p);
      --title-y: var(--ram-title-y-p);
      --img-scale: var(--ram-scale);
      --img-y: var(--ram-y);
    }

    .cat[data-key="job"]{
      --card-h: var(--job-card-h-p);
      --img-h: var(--job-img-h-p);
      --title-h: var(--job-title-h-p);
      --title-size: var(--job-title-size-p);
      --title-y: var(--job-title-y-p);
      --img-scale: var(--job-scale);
      --img-y: var(--job-y);
    }

    .cat[data-key="kit"]{
      --card-h: var(--kit-card-h-p);
      --img-h: var(--kit-img-h-p);
      --title-h: var(--kit-title-h-p);
      --title-size: var(--kit-title-size-p);
      --title-y: var(--kit-title-y-p);
      --img-scale: var(--kit-scale);
      --img-y: var(--kit-y);
    }

    .cat[data-key="song"]{
      --card-h: var(--song-card-h-p);
      --img-h: var(--song-img-h-p);
      --title-h: var(--song-title-h-p);
      --title-size: var(--song-title-size-p);
      --title-y: var(--song-title-y-p);
      --img-scale: var(--song-scale);
      --img-y: var(--song-y);
    }

    .cat[data-key="place"]{
      --card-h: var(--place-card-h-p);
      --img-h: var(--place-img-h-p);
      --title-h: var(--place-title-h-p);
      --title-size: var(--place-title-size-p);
      --title-y: var(--place-title-y-p);
      --img-scale: var(--place-scale);
      --img-y: var(--place-y);
    }

    .actions{
      width:min(100%, 760px);
      display:flex;
      align-items:center;
      justify-content:center;
      gap:var(--actions-gap-p);
      margin-top:4px;
      direction:ltr;
      transform:translate(var(--actions-x-p), var(--actions-y-p));
    }

    .home-btn{
      width:var(--home-size-p);
      height:var(--home-size-p);
      border-radius:50%;
      border:6px solid #000;
      background:#9fd0ff;
      box-shadow:0 8px 0 rgba(0,0,0,.28);
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      flex:0 0 auto;
      transition:transform .12s ease;
      transform:translate(var(--home-x-p), var(--home-y-p));
    }

    .home-btn:active{
      transform:translate(var(--home-x-p), calc(var(--home-y-p) + 2px)) scale(.99);
    }

    .home-btn svg{
      width:var(--home-icon-size-p);
      height:var(--home-icon-size-p);
      fill:#111;
    }

    .start-btn{
      border:none;
      width:min(var(--start-width-p), calc(100vw - 150px));
      max-width:100%;
      height:var(--start-height-p);
      border-radius:999px;
      border:6px solid #000;
      background:var(--green);
      color:#fff;
      font-size:var(--start-font-p);
      font-weight:700;
      box-shadow:0 8px 0 rgba(0,0,0,.28);
      cursor:pointer;
      transition:transform .12s ease, opacity .12s ease, filter .12s ease;
      transform:translate(var(--start-x-p), var(--start-y-p));
    }

    .start-btn:active{
      transform:translate(var(--start-x-p), calc(var(--start-y-p) + 2px)) scale(.99);
    }

    .start-btn[disabled]{
      opacity:.55;
      filter:grayscale(.12);
      cursor:not-allowed;
    }

    @media (max-width:700px){
      .page{
        padding:12px 12px 110px;
      }

      .shell{
        padding-top:96px;
        gap:16px;
      }

      .board{
        padding:14px 12px;
        gap:14px;
        border-radius:28px;
      }

      .cat{
        border-radius:24px;
        border-width:5px;
      }

      .cat-visual img{
        max-width:84%;
      }
    }

    /* ===== الوضع الأفقي ===== */
    @media (orientation:landscape){
      body{
        overflow:hidden;
      }

      .page{
        height:100vh;
        min-height:100vh;
        padding:8px 12px 10px;
        overflow:hidden;
      }

      .top-logo{
        top:8px;
        left:8px;
      }

      .top-logo img{
        width:86px;
      }

      .shell{
        width:min(100%, 1120px);
        height:100%;
        min-height:0;
        padding-top:10px;
        display:grid;
        grid-template-rows:auto 1fr auto;
        gap:8px;
        align-items:stretch;
      }

      .title{
        font-size:var(--game-title-size-l);
        transform:translate(var(--game-title-x-l), var(--game-title-y-l));
      }

      .board{
        width:100%;
        min-height:0;
        height:100%;
        grid-template-columns:repeat(3, minmax(0, 1fr));
        grid-template-rows:repeat(2, minmax(0, 1fr));
        gap:10px;
        padding:10px;
        border-radius:24px;
        align-content:stretch;
      }

      /* ===== ربط كل كتاغوري بقيم الأفقي ===== */
      .cat[data-key="hkm"]{
        --card-h: var(--hkm-card-h-l);
        --img-h: var(--hkm-img-h-l);
        --title-h: var(--hkm-title-h-l);
        --title-size: var(--hkm-title-size-l);
        --title-y: var(--hkm-title-y-l);
      }

      .cat[data-key="ram"]{
        --card-h: var(--ram-card-h-l);
        --img-h: var(--ram-img-h-l);
        --title-h: var(--ram-title-h-l);
        --title-size: var(--ram-title-size-l);
        --title-y: var(--ram-title-y-l);
      }

      .cat[data-key="job"]{
        --card-h: var(--job-card-h-l);
        --img-h: var(--job-img-h-l);
        --title-h: var(--job-title-h-l);
        --title-size: var(--job-title-size-l);
        --title-y: var(--job-title-y-l);
      }

      .cat[data-key="kit"]{
        --card-h: var(--kit-card-h-l);
        --img-h: var(--kit-img-h-l);
        --title-h: var(--kit-title-h-l);
        --title-size: var(--kit-title-size-l);
        --title-y: var(--kit-title-y-l);
      }

      .cat[data-key="song"]{
        --card-h: var(--song-card-h-l);
        --img-h: var(--song-img-h-l);
        --title-h: var(--song-title-h-l);
        --title-size: var(--song-title-size-l);
        --title-y: var(--song-title-y-l);
      }

      .cat[data-key="place"]{
        --card-h: var(--place-card-h-l);
        --img-h: var(--place-img-h-l);
        --title-h: var(--place-title-h-l);
        --title-size: var(--place-title-size-l);
        --title-y: var(--place-title-y-l);
      }

      .cat{
        border-width:4px;
        border-radius:20px;
        box-shadow:0 5px 0 rgba(0,0,0,.24);
        padding:5px 7px 4px;
      }

      .cat-visual img{
        max-width:78%;
      }

      .actions{
        gap:var(--actions-gap-l);
        transform:translate(var(--actions-x-l), var(--actions-y-l));
      }

      .home-btn{
        width:var(--home-size-l);
        height:var(--home-size-l);
        border-width:4px;
        box-shadow:0 5px 0 rgba(0,0,0,.24);
        transform:translate(var(--home-x-l), var(--home-y-l));
      }

      .home-btn:active{
        transform:translate(var(--home-x-l), calc(var(--home-y-l) + 2px)) scale(.99);
      }

      .home-btn svg{
        width:var(--home-icon-size-l);
        height:var(--home-icon-size-l);
      }

      .start-btn{
        width:min(var(--start-width-l), calc(100vw - 110px));
        height:var(--start-height-l);
        font-size:var(--start-font-l);
        border-width:4px;
        box-shadow:0 5px 0 rgba(0,0,0,.24);
        transform:translate(var(--start-x-l), var(--start-y-l));
      }

      .start-btn:active{
        transform:translate(var(--start-x-l), calc(var(--start-y-l) + 2px)) scale(.99);
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="top-logo" aria-label="صندوق المسابقات">
      <img src="logo.PNG" alt="صندوق المسابقات">
    </div>

    <main class="shell">
      <h1 class="title">بدون كلام</h1>

      <section class="board" aria-label="الكتاغوريات">
        <button class="cat" type="button" data-key="hkm" data-name="حكم وأمثال">
          <div class="cat-title">حكم وأمثال</div>
          <div class="cat-visual"><img src="hkm.PNG" alt="حكم وأمثال"></div>
        </button>

        <button class="cat" type="button" data-key="ram" data-name="مسلسلات رمضانية">
          <div class="cat-title">مسلسلات رمضانية</div>
          <div class="cat-visual"><img src="ram.PNG" alt="مسلسلات رمضانية"></div>
        </button>

        <button class="cat" type="button" data-key="job" data-name="وظائف ومهن">
          <div class="cat-title">وظائف ومهن</div>
          <div class="cat-visual"><img src="job.PNG" alt="وظائف ومهن"></div>
        </button>

        <button class="cat" type="button" data-key="kit" data-name="أدوات المطبخ">
          <div class="cat-title">أدوات المطبخ</div>
          <div class="cat-visual"><img src="kit.PNG" alt="أدوات المطبخ"></div>
        </button>

        <button class="cat" type="button" data-key="song" data-name="أغاني">
          <div class="cat-title">أغاني</div>
          <div class="cat-visual"><img src="song.PNG" alt="أغاني"></div>
        </button>

        <button class="cat" type="button" data-key="place" data-name="أماكن ومواقع">
          <div class="cat-title">أماكن ومواقع</div>
          <div class="cat-visual"><img src="place.PNG" alt="أماكن ومواقع"></div>
        </button>
      </section>

      <div class="actions">
        <button class="home-btn" id="homeBtn" type="button" aria-label="الرئيسية" title="الرئيسية">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 3.2 3.2 10.5a1 1 0 0 0 .64 1.77h1.41v7.05A1.68 1.68 0 0 0 6.93 21h3.74a1 1 0 0 0 1-1v-4.1h.66V20a1 1 0 0 0 1 1h3.74a1.68 1.68 0 0 0 1.68-1.68v-7.05h1.41a1 1 0 0 0 .64-1.77L12 3.2z"/>
          </svg>
        </button>

        <button class="start-btn" id="startBtn" type="button" disabled>ابدأ اللعب</button>
      </div>
    </main>
  </div>

  <script>
    const cards = Array.from(document.querySelectorAll(".cat"));
    const startBtn = document.getElementById("startBtn");
    const homeBtn = document.getElementById("homeBtn");

    const savedKey = sessionStorage.getItem("bdonKalam_categoryKey") || "";
    let selectedKey = savedKey;

    function applySelection(key) {
      selectedKey = key || "";
      cards.forEach(card => {
        card.classList.toggle("selected", card.dataset.key === selectedKey);
      });
      startBtn.disabled = !selectedKey;
    }

    cards.forEach(card => {
      card.addEventListener("click", () => {
        const key = card.dataset.key;
        const name = card.dataset.name;

        sessionStorage.setItem("bdonKalam_categoryKey", key);
        sessionStorage.setItem("bdonKalam_categoryName", name);
        sessionStorage.removeItem("bdonKalam_selectedNumber");

        applySelection(key);
      });
    });

    startBtn.addEventListener("click", () => {
      if (!selectedKey) return;
      window.location.href = "numbers.html";
    });

    homeBtn.addEventListener("click", () => {
      window.location.href = "index.html";
    });

    applySelection(savedKey);
  </script>
</body>
</html>
