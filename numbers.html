<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>لعبة بدون كلام - الأرقام</title>

  <style>
    @font-face{
      font-family:"Estedad";
      src:url("Estedad-Bold.ttf") format("truetype");
      font-style:normal;
      font-weight:700;
      font-display:swap;
    }

    :root{
      --bg:#083b73;
      --panel:#184d94;
      --panel-2:#113f7d;
      --white:#f6f6f6;
      --black:#111111;
      --gold:#e2bb57;
      --tile-bg:#e7d5a7;
      --tile-opened:#1b3f73;
      --tile-opened-text:#ffffff;
      --safe-bottom: env(safe-area-inset-bottom, 0px);

      --page-max-p: 920px;
      --page-max-l: 1860px;

      --title-size-p: 64px;
      --title-size-l: 42px;
      --title-shadow:0 4px 10px rgba(0,0,0,.30);

      --logo-width-p: 118px;
      --logo-width-l: 92px;

      --scores-width-p: 318px;
      --team-box-height-p: 46px;
      --team-font-p: 20px;
      --score-box-size-p: 46px;

      --team-box-height-l: 42px;
      --team-font-l: 19px;
      --score-box-size-l: 42px;
      --team-box-width-l: 170px;

      --header-min-h-p: 220px;
      --header-gap-p: 22px;
      --header-gap-l: 18px;

      --board-gap-p: 12px;
      --board-gap-l: 12px;
      --board-pad-p: 14px;
      --board-pad-l: 14px;
      --board-radius-p: 30px;
      --board-radius-l: 30px;

      --tile-radius-p: 22px;
      --tile-radius-l: 20px;
      --tile-font-p: 32px;
      --tile-font-l: 26px;

      --back-width-p: 110px;
      --back-height-p: 74px;
      --back-left-p: 18px;
      --back-bottom-p: 18px;
      --back-icon-p: 30px;

      --back-width-l: 108px;
      --back-height-l: 72px;
      --back-left-l: 20px;
      --back-bottom-l: 14px;
      --back-icon-l: 30px;

      --footer-space-p: 112px;
      --footer-space-l: 96px;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
      font-family:"Estedad", Tahoma, Arial, "Segoe UI", sans-serif;
    }

    html,body{
      margin:0;
      min-height:100%;
      background:var(--bg);
      color:var(--white);
    }

    body{
      min-height:100vh;
      overflow-x:hidden;
    }

    .page{
      min-height:100dvh;
      background:var(--bg);
      overflow-x:hidden;
      overflow-y:auto;
      padding:14px 14px calc(var(--footer-space-p) + var(--safe-bottom));
    }

    .shell{
      width:min(100%, var(--page-max-p));
      margin:0 auto;
      display:flex;
      flex-direction:column;
      gap:var(--header-gap-p);
    }

    .top-area{
      position:relative;
      min-height:var(--header-min-h-p);
      width:100%;
    }

    .brand{
      position:absolute;
      top:0;
      left:0;
      z-index:2;
      user-select:none;
      pointer-events:none;
    }

    .brand img{
      width:min(var(--logo-width-p), 26vw);
      height:auto;
      display:block;
    }

    .scores-portrait{
      position:absolute;
      top:0;
      right:0;
      width:min(var(--scores-width-p), 42vw);
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .scores-landscape{
      display:none;
    }

    .team-row{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .team-name,
    .team-score{
      border:4px solid #000;
      background:#fff;
      color:#111;
      box-shadow:0 6px 0 rgba(0,0,0,.24);
      line-height:1;
      text-align:center;
    }

    .team-name{
      flex:1;
      min-width:0;
      height:var(--team-box-height-p);
      border-radius:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0 10px;
      font-size:var(--team-font-p);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .team-score{
      width:var(--score-box-size-p);
      height:var(--score-box-size-p);
      flex:0 0 auto;
      border-radius:14px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:20px;
    }

    .title{
      margin:0;
      padding-top:126px;
      color:#fff;
      text-shadow:var(--title-shadow);
      text-align:center;
      line-height:1;
      font-size:min(var(--title-size-p), 15vw);
      letter-spacing:.2px;
    }

    .numbers-board{
      width:100%;
      background:linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
      border-radius:var(--board-radius-p);
      padding:var(--board-pad-p);
      display:grid;
      grid-template-columns:repeat(5, minmax(0, 1fr));
      gap:var(--board-gap-p);
      box-shadow:0 6px 18px rgba(0,0,0,.18);
      direction:rtl;
    }

    .num-btn{
      appearance:none;
      border:none;
      background:var(--tile-bg);
      color:#152b4f;
      border:5px solid #000;
      border-radius:var(--tile-radius-p);
      box-shadow:0 7px 0 rgba(0,0,0,.26);
      aspect-ratio:1/1;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      font-size:clamp(28px, 6vw, var(--tile-font-p));
      line-height:1;
      cursor:pointer;
      transition:transform .12s ease, background .12s ease, color .12s ease, box-shadow .12s ease;
      user-select:none;
    }

    .num-btn:active{
      transform:translateY(2px) scale(.99);
    }

    .num-btn.opened{
      background:var(--tile-opened);
      color:var(--tile-opened-text);
    }

    .bottom-bar{
      position:fixed;
      left:0;
      right:0;
      bottom:calc(var(--safe-bottom));
      height:calc(var(--footer-space-p));
      pointer-events:none;
      z-index:35;
    }

    .back-btn{
      position:absolute;
      left:var(--back-left-p);
      bottom:var(--back-bottom-p);
      width:var(--back-width-p);
      height:var(--back-height-p);
      border:none;
      border-radius:999px;
      border:5px solid #000;
      background:var(--gold);
      box-shadow:0 7px 0 rgba(0,0,0,.26);
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      transition:transform .12s ease;
      padding:0;
      pointer-events:auto;
    }

    .back-btn:active{
      transform:translateY(2px) scale(.99);
    }

    .back-btn svg{
      width:var(--back-icon-p);
      height:var(--back-icon-p);
      stroke:#fff;
      fill:none;
      stroke-width:2.8;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    @media (max-width:700px){
      .page{
        padding:12px 12px calc(var(--footer-space-p) + var(--safe-bottom));
      }

      .shell{
        gap:18px;
      }

      .numbers-board{
        padding:12px;
        gap:12px;
      }

      .num-btn{
        border-width:5px;
      }
    }

    @media (orientation:landscape){
      .page{
        padding:12px 20px calc(var(--footer-space-l) + var(--safe-bottom));
      }

      .shell{
        width:min(100%, var(--page-max-l));
        gap:14px;
      }

      .top-area{
        min-height:90px;
        display:grid;
        grid-template-columns:max-content 1fr max-content;
        align-items:center;
        gap:var(--header-gap-l);
      }

      /* ✅ النتائج يسار */
      .scores-landscape{
        display:flex;
        align-items:center;
        gap:10px;
        direction:ltr;
        grid-column:1;
        justify-self:start;
        align-self:center;
      }

      .scores-landscape .team-name{
        width:var(--team-box-width-l);
        height:var(--team-box-height-l);
        flex:0 0 auto;
        font-size:var(--team-font-l);
      }

      .scores-landscape .team-score{
        width:var(--score-box-size-l);
        height:var(--score-box-size-l);
        font-size:19px;
        border-radius:13px;
      }

      /* ✅ العنوان وسط */
      .title{
        grid-column:2;
        justify-self:center;
        align-self:center;
        padding-top:0;
        margin:0;
        font-size:min(var(--title-size-l), 4vw);
      }

      /* ✅ اللوقو يمين */
      .brand{
        position:static;
        grid-column:3;
        justify-self:end;
        align-self:center;
      }

      .brand img{
        width:var(--logo-width-l);
      }

      .scores-portrait{
        display:none;
      }

      .numbers-board{
        width:min(100%, var(--page-max-l));
        grid-template-columns:repeat(10, minmax(0, 1fr));
        gap:var(--board-gap-l);
        padding:var(--board-pad-l);
        border-radius:var(--board-radius-l);
      }

      .num-btn{
        border-radius:var(--tile-radius-l);
        font-size:min(var(--tile-font-l), 1.95vw);
        border-width:4px;
        box-shadow:0 5px 0 rgba(0,0,0,.24);
      }

      .bottom-bar{
        height:var(--footer-space-l);
      }

      .back-btn{
        left:var(--back-left-l);
        bottom:var(--back-bottom-l);
        width:var(--back-width-l);
        height:var(--back-height-l);
        border-width:4px;
        box-shadow:0 5px 0 rgba(0,0,0,.24);
      }

      .back-btn svg{
        width:var(--back-icon-l);
        height:var(--back-icon-l);
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <main class="shell">
      <header class="top-area">
        <div class="brand" aria-label="صندوق المسابقات">
          <img src="logo.PNG" alt="صندوق المسابقات">
        </div>

        <div class="scores-portrait" aria-label="نتائج الفريقين">
          <div class="team-row">
            <div class="team-name" id="team1NamePortrait">الفريق الأول</div>
            <div class="team-score" id="team1ScorePortrait">0</div>
          </div>
          <div class="team-row">
            <div class="team-name" id="team2NamePortrait">الفريق الثاني</div>
            <div class="team-score" id="team2ScorePortrait">0</div>
          </div>
        </div>

        <h1 class="title">لعبة بدون كلام</h1>

        <div class="scores-landscape" aria-label="نتائج الفريقين">
          <div class="team-name" id="team1NameLandscape">الفريق الأول</div>
          <div class="team-score" id="team1ScoreLandscape">0</div>
          <div class="team-score" id="team2ScoreLandscape">0</div>
          <div class="team-name" id="team2NameLandscape">الفريق الثاني</div>
        </div>
      </header>

      <section class="numbers-board" id="numbersBoard" aria-label="أرقام اللعبة"></section>
    </main>

    <div class="bottom-bar">
      <button class="back-btn" id="backBtn" type="button" aria-label="الرجوع للكتاغوريات" title="الرجوع للكتاغوريات">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M9 7 4 12l5 5"></path>
          <path d="M5 12h9a6 6 0 0 0 6-6"></path>
        </svg>
      </button>
    </div>
  </div>

  <script>
    const BARCODE_PAGE = "barcode.html";
    const OPENED_STORAGE_KEY = "bdonKalam_openedNumbers_session_v1";

    const board = document.getElementById("numbersBoard");
    const backBtn = document.getElementById("backBtn");

    function getStoredValue(keys, fallback) {
      for (const key of keys) {
        const value = sessionStorage.getItem(key) || localStorage.getItem(key);
        if (value && String(value).trim()) return String(value).trim();
      }
      return fallback;
    }

    const team1 = getStoredValue(
      ["bdonKalam_team1", "bdonKalam_team1Name", "team1", "team1Name"],
      "الفريق الأول"
    );

    const team2 = getStoredValue(
      ["bdonKalam_team2", "bdonKalam_team2Name", "team2", "team2Name"],
      "الفريق الثاني"
    );

    document.getElementById("team1NamePortrait").textContent = team1;
    document.getElementById("team2NamePortrait").textContent = team2;
    document.getElementById("team1NameLandscape").textContent = team1;
    document.getElementById("team2NameLandscape").textContent = team2;

    const categoryKey = sessionStorage.getItem("bdonKalam_categoryKey") || "default";
    const categoryName = sessionStorage.getItem("bdonKalam_categoryName") || "";

    function readOpenedMap() {
      try {
        return JSON.parse(sessionStorage.getItem(OPENED_STORAGE_KEY) || "{}");
      } catch {
        return {};
      }
    }

    function writeOpenedMap(map) {
      sessionStorage.setItem(OPENED_STORAGE_KEY, JSON.stringify(map));
    }

    function getOpenedSet() {
      const map = readOpenedMap();
      const list = Array.isArray(map[categoryKey]) ? map[categoryKey] : [];
      return new Set(list.map(Number));
    }

    function markOpened(num) {
      const map = readOpenedMap();
      const list = Array.isArray(map[categoryKey]) ? map[categoryKey].map(Number) : [];
      if (!list.includes(num)) list.push(num);
      map[categoryKey] = list;
      writeOpenedMap(map);
    }

    function openBarcode(num) {
      sessionStorage.setItem("bdonKalam_selectedNumber", String(num));
      markOpened(num);

      const url =
        `${BARCODE_PAGE}?cat=${encodeURIComponent(categoryKey)}&catName=${encodeURIComponent(categoryName)}&num=${encodeURIComponent(num)}`;

      window.location.href = url;
    }

    function renderNumbers() {
      const opened = getOpenedSet();
      board.innerHTML = "";

      for (let i = 1; i <= 30; i++) {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "num-btn";
        if (opened.has(i)) btn.classList.add("opened");
        btn.textContent = i;
        btn.setAttribute("aria-label", `الرقم ${i}`);
        btn.addEventListener("click", () => openBarcode(i));
        board.appendChild(btn);
      }
    }

    backBtn.addEventListener("click", () => {
      window.location.href = "categories.html";
    });

    renderNumbers();
  </script>
</body>
</html>
