<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>بدون كلام - الكتاغوريات</title>

  <style>
    @font-face{
      font-family:"Estedad";
      src:url("Estedad-Bold.ttf") format("truetype");
      font-style:normal;
      font-weight:700;
      font-display:swap;
    }

    :root{
      --bg:#083b73;
      --panel:#0e4a8a;
      --panel-2:#0b427c;
      --gold:#f4b512;
      --white:#f6f6f6;
      --green:#08c968;
      --black:#101010;

      /* خلفية مربعات الكتاغوريات */
      --card-bg:#edf2ec;
      --selected:#dcebdc;

      --shadow-soft:0 6px 18px rgba(0,0,0,.18);

      /* التحكم بالصور */
      --ram-scale: 1.45;
      --ram-y: 0px;

      --hkm-scale: 1.45;
      --hkm-y: 0px;

      --kit-scale: 1.45;
      --kit-y: 0px;

      --job-scale: 1.45;
      --job-y: 0px;

      --place-scale: 1.45;
      --place-y: 0px;

      --song-scale: 1.45;
      --song-y: 0px;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
      font-family:"Estedad", Tahoma, Arial, "Segoe UI", sans-serif;
    }

    html,body{
      margin:0;
      min-height:100%;
      background:var(--bg);
      color:var(--white);
    }

    body{
      min-height:100vh;
      overflow-x:hidden;
    }

    .page{
      position:relative;
      min-height:100vh;
      background:var(--bg);
      overflow:hidden;
      padding:14px 14px 110px;
    }

    .top-logo{
      position:absolute;
      top:12px;
      left:12px;
      z-index:5;
      user-select:none;
      pointer-events:none;
    }

    .top-logo img{
      width:min(128px, 24vw);
      height:auto;
      display:block;
    }

    .shell{
      width:min(100%, 980px);
      min-height:calc(100vh - 24px);
      margin:0 auto;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:18px;
      padding-top:96px;
      position:relative;
      z-index:2;
    }

    .title{
      margin:0;
      color:var(--gold);
      font-weight:700;
      line-height:1;
      text-align:center;
      font-size:clamp(54px, 10vw, 108px);
      letter-spacing:.2px;
    }

    .board{
      width:min(100%, 760px);
      background:linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
      border:none;
      border-radius:34px;
      padding:18px 16px;
      box-shadow:var(--shadow-soft);
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:16px;
    }

    .cat{
      appearance:none;
      border:none;
      background:var(--card-bg);
      border:6px solid #000;
      border-radius:28px;
      min-height:198px;
      padding:10px 10px 8px;
      box-shadow:0 8px 0 rgba(0,0,0,.28);
      cursor:pointer;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      gap:4px;
      transition:transform .12s ease, background .12s ease, border-color .12s ease, box-shadow .12s ease;
    }

    .cat:active{
      transform:translateY(2px) scale(.99);
    }

    .cat.selected{
      background:var(--selected);
      border-color:var(--gold);
      box-shadow:0 0 0 4px rgba(244,181,18,.22), 0 8px 0 rgba(0,0,0,.28);
    }

    .cat-title{
      width:100%;
      text-align:center;
      color:#0f2540;
      font-size:clamp(24px, 4vw, 38px);
      font-weight:700;
      line-height:1.2;
      min-height:40px;
      display:flex;
      align-items:flex-start;
      justify-content:center;
      padding-top:8px;
    }

    .cat-visual{
      flex:1 1 auto;
      width:100%;
      min-height:94px;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      padding:0;
    }

    .cat-visual img{
      max-width:76%;
      max-height:76%;
      width:auto;
      height:auto;
      object-fit:contain;
      display:block;
      pointer-events:none;
      user-select:none;
      transform-origin:center center;
    }

    .cat[data-key="ram"] .cat-visual img{
      transform:translateY(var(--ram-y)) scale(var(--ram-scale));
    }

    .cat[data-key="hkm"] .cat-visual img{
      transform:translateY(var(--hkm-y)) scale(var(--hkm-scale));
    }

    .cat[data-key="kit"] .cat-visual img{
      transform:translateY(var(--kit-y)) scale(var(--kit-scale));
    }

    .cat[data-key="job"] .cat-visual img{
      transform:translateY(var(--job-y)) scale(var(--job-scale));
    }

    .cat[data-key="place"] .cat-visual img{
      transform:translateY(var(--place-y)) scale(var(--place-scale));
    }

    .cat[data-key="song"] .cat-visual img{
      transform:translateY(var(--song-y)) scale(var(--song-scale));
    }

    .actions{
      width:min(100%, 760px);
      display:flex;
      align-items:center;
      justify-content:center;
      gap:14px;
      margin-top:4px;
      direction:ltr;
    }

    .home-btn{
      width:96px;
      height:96px;
      border-radius:50%;
      border:6px solid #000;
      background:#9fd0ff;
      box-shadow:0 8px 0 rgba(0,0,0,.28);
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      flex:0 0 auto;
      transition:transform .12s ease;
    }

    .home-btn:active{
      transform:translateY(2px) scale(.99);
    }

    .home-btn svg{
      width:46px;
      height:46px;
      fill:#111;
    }

    .start-btn{
      border:none;
      min-width:min(560px, calc(100vw - 150px));
      max-width:100%;
      min-height:92px;
      border-radius:999px;
      border:6px solid #000;
      background:var(--green);
      color:#fff;
      font-size:clamp(34px, 6vw, 54px);
      font-weight:700;
      box-shadow:0 8px 0 rgba(0,0,0,.28);
      cursor:pointer;
      transition:transform .12s ease, opacity .12s ease, filter .12s ease;
    }

    .start-btn:active{
      transform:translateY(2px) scale(.99);
    }

    .start-btn[disabled]{
      opacity:.55;
      filter:grayscale(.12);
      cursor:not-allowed;
    }

    @media (max-width:700px){
      .page{
        padding:12px 12px 110px;
      }

      .shell{
        padding-top:96px;
        gap:16px;
      }

      .title{
        font-size:clamp(42px, 11vw, 76px);
      }

      .board{
        padding:14px 12px;
        gap:14px;
        border-radius:28px;
      }

      .cat{
        min-height:186px;
        border-radius:24px;
        padding:10px 8px 8px;
        gap:4px;
      }

      .cat-title{
        font-size:clamp(20px, 5.2vw, 31px);
        min-height:40px;
        padding-top:8px;
      }

      .cat-visual{
        min-height:86px;
      }

      .cat-visual img{
        max-width:78%;
        max-height:78%;
      }

      .actions{
        gap:12px;
      }

      .home-btn{
        width:82px;
        height:82px;
      }

      .home-btn svg{
        width:38px;
        height:38px;
      }

      .start-btn{
        min-height:80px;
        min-width:calc(100vw - 126px);
        font-size:clamp(28px, 7vw, 44px);
      }
    }

    @media (max-width:430px){
      .cat{
        min-height:176px;
      }

      .cat-title{
        min-height:36px;
        padding-top:8px;
      }

      .cat-visual{
        min-height:78px;
      }
    }

    /* الوضع الأفقي */
    @media (orientation:landscape){
      body{
        overflow:hidden;
      }

      .page{
        height:100vh;
        min-height:100vh;
        padding:8px 12px 10px;
        overflow:hidden;
      }

      .top-logo{
        top:8px;
        left:8px;
      }

      .top-logo img{
        width:86px;
      }

      .shell{
        width:min(100%, 1120px);
        height:100%;
        min-height:0;
        padding-top:10px;
        display:grid;
        grid-template-rows:auto 1fr auto;
        gap:8px;
        align-items:stretch;
      }

      .title{
        font-size:clamp(24px, 3.2vw, 46px);
        line-height:.95;
      }

      .board{
        width:100%;
        min-height:0;
        height:100%;
        grid-template-columns:repeat(3, minmax(0, 1fr));
        grid-template-rows:repeat(2, minmax(0, 1fr));
        gap:10px;
        padding:10px;
        border-radius:24px;
        align-content:stretch;
      }

      .cat{
        min-height:0;
        height:100%;
        padding:6px 8px 6px;
        gap:2px;
        border-width:4px;
        border-radius:20px;
        box-shadow:0 5px 0 rgba(0,0,0,.24);
      }

      .cat-title{
        font-size:clamp(14px, 1.4vw, 24px);
        min-height:24px;
        padding-top:4px;
      }

      .cat-visual{
        flex:1 1 auto;
        min-height:0;
      }

      .cat-visual img{
        max-width:62%;
        max-height:62%;
      }

      .actions{
        width:100%;
        gap:10px;
        margin-top:0;
      }

      .home-btn{
        width:58px;
        height:58px;
        border-width:4px;
        box-shadow:0 5px 0 rgba(0,0,0,.24);
      }

      .home-btn svg{
        width:28px;
        height:28px;
      }

      .start-btn{
        min-height:54px;
        min-width:min(560px, calc(100vw - 110px));
        font-size:clamp(18px, 2vw, 30px);
        border-width:4px;
        box-shadow:0 5px 0 rgba(0,0,0,.24);
      }
    }

    @media (orientation:landscape) and (max-height:500px){
      .page{
        padding:6px 10px 8px;
      }

      .top-logo img{
        width:76px;
      }

      .shell{
        padding-top:8px;
        gap:6px;
      }

      .title{
        font-size:clamp(20px, 2.7vw, 34px);
      }

      .board{
        gap:8px;
        padding:8px;
      }

      .cat{
        padding:5px 6px 4px;
        border-width:3px;
        box-shadow:0 4px 0 rgba(0,0,0,.22);
      }

      .cat-title{
        font-size:clamp(12px, 1.1vw, 18px);
        min-height:20px;
        padding-top:3px;
      }

      .cat-visual img{
        max-width:56%;
        max-height:56%;
      }

      .home-btn{
        width:50px;
        height:50px;
      }

      .home-btn svg{
        width:22px;
        height:22px;
      }

      .start-btn{
        min-height:46px;
        font-size:clamp(16px, 1.5vw, 24px);
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="top-logo" aria-label="صندوق المسابقات">
      <img src="logo.PNG" alt="صندوق المسابقات">
    </div>

    <main class="shell">
      <h1 class="title">بدون كلام</h1>

      <section class="board" aria-label="الكتاغوريات">
        <button class="cat" type="button" data-key="hkm" data-name="حكم وأمثال">
          <div class="cat-title">حكم وأمثال</div>
          <div class="cat-visual"><img src="hkm.PNG" alt="حكم وأمثال"></div>
        </button>

        <button class="cat" type="button" data-key="ram" data-name="مسلسلات رمضانية">
          <div class="cat-title">مسلسلات رمضانية</div>
          <div class="cat-visual"><img src="ram.PNG" alt="مسلسلات رمضانية"></div>
        </button>

        <button class="cat" type="button" data-key="job" data-name="وظائف ومهن">
          <div class="cat-title">وظائف ومهن</div>
          <div class="cat-visual"><img src="job.PNG" alt="وظائف ومهن"></div>
        </button>

        <button class="cat" type="button" data-key="kit" data-name="أدوات المطبخ">
          <div class="cat-title">أدوات المطبخ</div>
          <div class="cat-visual"><img src="kit.PNG" alt="أدوات المطبخ"></div>
        </button>

        <button class="cat" type="button" data-key="song" data-name="أغاني">
          <div class="cat-title">أغاني</div>
          <div class="cat-visual"><img src="song.PNG" alt="أغاني"></div>
        </button>

        <button class="cat" type="button" data-key="place" data-name="أماكن ومواقع">
          <div class="cat-title">أماكن ومواقع</div>
          <div class="cat-visual"><img src="place.PNG" alt="أماكن ومواقع"></div>
        </button>
      </section>

      <div class="actions">
        <button class="home-btn" id="homeBtn" type="button" aria-label="الرئيسية" title="الرئيسية">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 3.2 3.2 10.5a1 1 0 0 0 .64 1.77h1.41v7.05A1.68 1.68 0 0 0 6.93 21h3.74a1 1 0 0 0 1-1v-4.1h.66V20a1 1 0 0 0 1 1h3.74a1.68 1.68 0 0 0 1.68-1.68v-7.05h1.41a1 1 0 0 0 .64-1.77L12 3.2z"/>
          </svg>
        </button>

        <button class="start-btn" id="startBtn" type="button" disabled>ابدأ اللعب</button>
      </div>
    </main>
  </div>

  <script>
    const cards = Array.from(document.querySelectorAll(".cat"));
    const startBtn = document.getElementById("startBtn");
    const homeBtn = document.getElementById("homeBtn");

    const savedKey = sessionStorage.getItem("bdonKalam_categoryKey") || "";
    let selectedKey = savedKey;

    function applySelection(key) {
      selectedKey = key || "";
      cards.forEach(card => {
        card.classList.toggle("selected", card.dataset.key === selectedKey);
      });
      startBtn.disabled = !selectedKey;
    }

    cards.forEach(card => {
      card.addEventListener("click", () => {
        const key = card.dataset.key;
        const name = card.dataset.name;

        sessionStorage.setItem("bdonKalam_categoryKey", key);
        sessionStorage.setItem("bdonKalam_categoryName", name);
        sessionStorage.removeItem("bdonKalam_selectedNumber");

        applySelection(key);
      });
    });

    startBtn.addEventListener("click", () => {
      if (!selectedKey) return;
      window.location.href = "numbers.html";
    });

    homeBtn.addEventListener("click", () => {
      window.location.href = "index.html";
    });

    applySelection(savedKey);
  </script>
</body>
</html>
