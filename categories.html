<!doctype html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>لعبة بدون كلام - الكتاغوريات</title>

  <style id="auth-gate-style">
    body{visibility:hidden !important;}
  </style>
  <script>
    (function () {
      const ACTIVATE_URL = "activate.html";
      const API_ME_URL = window.location.origin + "/api/me";
      const HIDE_STYLE_ID = "auth-gate-style";

      const TOKEN_KEYS = [
        "bdonKalam_token_v1",
        "bdonKalam_token",
        "sandooq_token_v1",
        "sandooq_token",
        "token"
      ];

      const EMAIL_KEYS = [
        "bdonKalam_email_v1",
        "bdonKalam_email",
        "sandooq_email",
        "user_email",
        "email"
      ];

      function readAny(keys) {
        for (const key of keys) {
          try {
            const value = localStorage.getItem(key) || sessionStorage.getItem(key);
            if (value && String(value).trim()) return String(value).trim();
          } catch (_) {}
        }
        return "";
      }

      function writeSafe(key, value) {
        if (!value) return;
        try { localStorage.setItem(key, value); } catch (_) {}
        try { sessionStorage.setItem(key, value); } catch (_) {}
      }

      function revealPage() {
        const gateStyle = document.getElementById(HIDE_STYLE_ID);
        if (gateStyle) gateStyle.remove();
      }

      function redirectToActivate() {
        location.replace(ACTIVATE_URL);
      }

      function isActivated(data) {
        return !!(
          data?.activated === true ||
          data?.is_activated === true ||
          data?.isActivated === true ||
          data?.user?.activated === true ||
          data?.user?.is_activated === true ||
          data?.user?.isActivated === true ||
          data?.status === "activated"
        );
      }

      async function checkAuthGate() {
        const token = readAny(TOKEN_KEYS);
        if (!token) {
          redirectToActivate();
          return;
        }

        try {
          const response = await fetch(API_ME_URL, {
            method: "GET",
            headers: {
              Authorization: "Bearer " + token
            },
            cache: "no-store"
          });

          let data = {};
          try {
            data = await response.json();
          } catch (_) {}

          if (!response.ok || !isActivated(data)) {
            redirectToActivate();
            return;
          }

          const email = String(
            data?.email ||
            data?.user?.email ||
            readAny(EMAIL_KEYS) ||
            ""
          ).trim().toLowerCase();

          if (email) {
            writeSafe("bdonKalam_email_v1", email);
          }

          if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", revealPage, { once: true });
          } else {
            revealPage();
          }
        } catch (_) {
          redirectToActivate();
        }
      }

      checkAuthGate();
    })();
  </script>

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
      font-family:"Estedad", Tahoma, Arial, "Segoe UI", sans-serif;
    }

    html,body{
      margin:0;
      min-height:100%;
      background:var(--bg);
      color:var(--ink);
    }

    body{
      min-height:100vh;
      overflow-x:hidden;
    }

    .page{
      position:relative;
      min-height:100dvh;
      overflow-x:hidden;
      overflow-y:auto;
      padding:12px 14px calc(var(--footer-space-p) + var(--safe-bottom));
      background:
        radial-gradient(circle at 18% 18%, rgba(255,255,255,.34), transparent 18%),
        radial-gradient(circle at 83% 16%, rgba(255,255,255,.22), transparent 18%),
        radial-gradient(circle at 62% 82%, rgba(255,255,255,.16), transparent 20%),
        linear-gradient(180deg, var(--bg), #f9f1dc 100%);
    }

    .page::before{
      content:"";
      position:absolute;
      inset:-180px;
      background-image:radial-gradient(var(--dot) 34%, transparent 36%);
      background-size:36px 36px;
      opacity:.68;
      animation:patternDiagonal 8s linear infinite;
      pointer-events:none;
      z-index:0;
    }

    .page::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(135deg, rgba(255,255,255,.08) 0%, transparent 30%),
        linear-gradient(315deg, rgba(255,255,255,.05) 0%, transparent 24%);
      pointer-events:none;
      z-index:0;
    }

    .floaters{
      position:absolute;
      inset:0;
      z-index:0;
      pointer-events:none;
      overflow:hidden;
    }

    .floater{
      position:absolute;
      border-radius:50%;
      animation:floaty 4.4s ease-in-out infinite;
      opacity:.5;
    }

    .floater.f1{
      width:14px;
      height:14px;
      top:15%;
      left:10%;
      background:#fff;
      box-shadow:0 0 0 5px rgba(255,255,255,.18);
    }

    .floater.f2{
      width:10px;
      height:10px;
      top:42%;
      left:8%;
      background:#fff;
      box-shadow:0 0 0 4px rgba(255,255,255,.12);
      animation-delay:-1s;
    }

    .floater.f3{
      width:12px;
      height:12px;
      bottom:17%;
      right:14%;
      background:#fff6cc;
      box-shadow:0 0 0 4px rgba(255,246,204,.18);
      animation-delay:-2s;
    }

    .floater.f4{
      width:9px;
      height:9px;
      top:28%;
      right:12%;
      background:#fff;
      box-shadow:0 0 0 3px rgba(255,255,255,.12);
      animation-delay:-3s;
    }

    .shell{
      width:min(100%, 980px);
      margin:0 auto;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:14px;
      padding-top:12px;
      position:relative;
      z-index:2;
    }

    .top-strip{
      width:min(100%, 960px);
      min-height:88px;
      background:linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
      border:4px solid var(--line);
      border-radius:30px;
      box-shadow:0 10px 0 rgba(0,0,0,.28);
      padding:10px 16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .strip-title{
      min-width:130px;
      display:flex;
      justify-content:flex-start;
      align-items:center;
    }

    .strip-title-text{
      display:inline-flex;
      flex-direction:column;
      align-items:center;
      line-height:.84;
      color:#11101a;
      font-size:clamp(30px, 5.6vw, 48px);
      letter-spacing:-.5px;
      transform:rotate(-6deg);
      text-shadow:
        -4px -4px 0 #fff,
         4px -4px 0 #fff,
        -4px  4px 0 #fff,
         4px  4px 0 #fff,
         0   -4px 0 #fff,
         0    4px 0 #fff,
        -4px  0   0 #fff,
         4px  0   0 #fff,
         0    7px 0 rgba(0,0,0,.05);
      filter:drop-shadow(0 6px 0 rgba(0,0,0,.04));
      user-select:none;
      pointer-events:none;
    }

    .strip-title-text .word-top{
      transform:translateY(-6px);
    }

    .strip-title-text .word-bottom{
      transform:translateY(2px);
    }

    .strip-scores{
      flex:1 1 auto;
      min-width:0;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .score-chip{
      min-width:142px;
      max-width:250px;
      min-height:50px;
      padding:6px 10px;
      border-radius:20px;
      border:3px solid var(--line);
      background:linear-gradient(180deg, #fffdf8 0%, #f4ecd0 100%);
      box-shadow:0 6px 0 rgba(0,0,0,.18);
      display:flex;
      align-items:center;
      gap:10px;
      justify-content:space-between;
    }

    .score-chip-name{
      flex:1 1 auto;
      min-width:0;
      color:#173e73;
      font-size:20px;
      line-height:1.15;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      text-align:right;
      display:flex;
      align-items:center;
      min-height:100%;
      padding-bottom:0;
      transform:translateY(-1px);
    }

    .score-chip-num{
      width:36px;
      height:36px;
      border-radius:13px;
      border:3px solid var(--line);
      background:var(--gold);
      box-shadow:0 4px 0 rgba(0,0,0,.16);
      color:#3f2b0c;
      display:flex;
      align-items:center;
      justify-content:center;
      flex:0 0 auto;
      padding:0;
      direction:ltr;
      text-align:center;
      line-height:1;
      font-weight:700;
      font-variant-numeric:tabular-nums;
    }

    .score-chip-num span{
      display:block;
      line-height:1;
      transform:translateY(0);
    }

    .strip-logo{
      min-width:100px;
      display:flex;
      justify-content:flex-end;
      align-items:center;
      user-select:none;
      pointer-events:none;
      filter:drop-shadow(0 4px 0 rgba(255,255,255,.38));
    }

    .strip-logo img{
      width:min(128px, 28vw);
      height:auto;
      display:block;
    }

    .board{
      width:min(100%, var(--board-width-p));
      background:linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
      border:4px solid var(--line);
      border-radius:var(--board-radius-p);
      padding:var(--board-pad-p);
      box-shadow:0 10px 0 rgba(0,0,0,.28);
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:var(--board-gap-p);
    }

    .cat{
      appearance:none;
      border:none;
      background:var(--card-bg);
      border:6px solid #000;
      border-radius:28px;
      box-shadow:0 8px 0 rgba(0,0,0,.28);
      cursor:pointer;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      gap:2px;
      transition:transform .12s ease, background .12s ease, border-color .12s ease, box-shadow .12s ease;
      padding:8px 8px 6px;
      height:var(--card-h);
      overflow:hidden;
      position:relative;
    }

    .cat:active{
      transform:translateY(2px) scale(.99);
    }

    .cat.selected{
      background:var(--selected);
      border-color:#f3c14f;
      box-shadow:
        0 0 0 6px rgba(246,211,122,.85),
        0 0 0 12px rgba(246,211,122,.25),
        0 8px 0 rgba(0,0,0,.28);
    }

    .cat.selected::after{
      content:"";
      position:absolute;
      inset:8px;
      border-radius:22px;
      border:3px solid rgba(255,244,207,.85);
      pointer-events:none;
    }

    .cat-title{
      width:100%;
      text-align:center;
      color:#fffdf7;
      font-weight:700;
      line-height:1.12;
      min-height:var(--title-h);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      padding-top:4px;
      margin:0;
      font-size:min(var(--title-size), 8vw);
      transform:translateY(var(--title-y));
      text-shadow:
        0 3px 0 rgba(0,0,0,.42),
        0 0 12px rgba(0,0,0,.14);
    }

    .cat-subtitle{
      display:block;
      margin-top:4px;
      font-size:.54em;
      line-height:1;
      opacity:.96;
      text-shadow:
        0 2px 0 rgba(0,0,0,.42),
        0 0 8px rgba(0,0,0,.12);
    }

    .cat-visual{
      flex:1 1 auto;
      width:100%;
      min-height:0;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      padding:0;
    }

    .cat-visual img{
      width:auto;
      height:auto;
      max-width:82%;
      max-height:var(--img-h);
      object-fit:contain;
      display:block;
      pointer-events:none;
      user-select:none;
      transform-origin:center center;
      transform:translateY(var(--img-y)) scale(var(--img-scale));
    }

    .cat[data-key="hkm"]{

      width:min(100%, var(--board-width-p));
      display:grid;
      grid-template-columns:var(--home-size-p) 1fr var(--home-size-p);
      align-items:center;
      gap:14px;
      margin-top:4px;
      direction:ltr;
    }

      height:1px;
    }

      height:var(--home-size-p);

      height:var(--start-height-p);
      border-radius:28px;
      border:6px solid #000;
      background:linear-gradient(180deg, var(--gold) 0%, var(--gold-dark) 100%);
      color:#fff;
      font-size:var(--start-font-p);
      font-weight:700;
      box-shadow:0 8px 0 rgba(0,0,0,.28);
      cursor:pointer;
      transition:transform .12s ease, opacity .12s ease, filter .12s ease;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:0 18px;
      text-shadow:0 3px 0 rgba(0,0,0,.16);
      line-height:1;
    }

    .start-inline:active{
      transform:translateY(2px) scale(.99);
    }

    .start-inline[disabled]{
      opacity:.55;
      filter:grayscale(.12);
      cursor:not-allowed;
    }

    .home-btn{
      position:fixed;
      left:var(--home-left-l);
      bottom:calc(var(--home-bottom-l) + var(--safe-bottom));
      width:var(--home-size-l);
      height:var(--home-size-l);
      border-radius:50%;
      border:4px solid #000;
      background:linear-gradient(180deg, var(--blue) 0%, var(--blue-2) 100%);
      box-shadow:0 5px 0 rgba(0,0,0,.24);
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      z-index:40;
      transition:transform .12s ease;
      transform:translate(var(--home-x-l), var(--home-y-l));
      padding:0;
    }

    .home-btn:active{
      transform:translate(var(--home-x-l), calc(var(--home-y-l) + 2px)) scale(.99);
    }

    .home-btn svg{
      width:var(--home-icon-size-l);
      height:var(--home-icon-size-l);
      fill:#111;
    }

    .start-btn{
      position:fixed;
      left:50%;
      bottom:calc(var(--start-bottom-l) + var(--safe-bottom));
      transform:translate(calc(-50% + var(--start-x-l)), var(--start-y-l));
      border:none;
      width:min(var(--start-width-l), calc(100vw - 170px));
      max-width:100%;
      height:var(--start-height-l);
      border-radius:28px;
      border:4px solid #000;
      background:linear-gradient(180deg, var(--gold) 0%, var(--gold-dark) 100%);
      color:#fff;
      font-size:var(--start-font-l);
      font-weight:700;
      box-shadow:0 5px 0 rgba(0,0,0,.24);
      cursor:pointer;
      z-index:40;
      transition:transform .12s ease, opacity .12s ease, filter .12s ease;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:0 18px;
      text-shadow:0 3px 0 rgba(0,0,0,.16);
      line-height:1;
    }

    .start-btn:active{
      transform:translate(calc(-50% + var(--start-x-l)), calc(var(--start-y-l) + 2px)) scale(.99);
    }

    .start-btn[disabled]{
      opacity:.55;
      filter:grayscale(.12);
      cursor:not-allowed;
    }

    .portrait-only{ display:block; }
    .landscape-only{ display:none !important; }

    @keyframes patternDiagonal{
      from{ background-position:0 0; }
      to{ background-position:92px -92px; }
    }

    @keyframes floaty{
      0%,100%{ transform:translateY(0); }
      50%{ transform:translateY(-10px); }
    }

    @media (max-width:760px){
      .page{
        padding:10px 12px calc(var(--footer-space-p) + var(--safe-bottom));
      }

      .shell{
        gap:12px;
        padding-top:10px;
      }

      .top-strip{
        min-height:80px;
        padding:8px 12px;
        border-radius:28px;
        gap:10px;
      }

      .strip-title{
        min-width:100px;
      }

      .strip-title-text{
        font-size:clamp(26px, 6vw, 42px);
      }

      .strip-scores{
        gap:8px;
      }

      .score-chip{
        min-width:126px;
        min-height:46px;
        padding:5px 8px;
      }

      .score-chip-name{
        font-size:18px;
        transform:translateY(-1px);
      }

      .score-chip-num{
        width:34px;
        height:34px;
        font-size:18px;
      }

      .strip-logo{
        min-width:76px;
      }

      .strip-logo img{
        width:min(110px, 24vw);
      }

      .board{
        padding:14px 12px;
        gap:14px;
        border-radius:28px;
      }

      .cat{
        border-radius:24px;
        border-width:5px;
      }

      .cat.selected{
        box-shadow:
          0 0 0 5px rgba(246,211,122,.85),
          0 0 0 10px rgba(246,211,122,.22),
          0 8px 0 rgba(0,0,0,.28);
      }

      .cat.selected::after{
        inset:7px;
        border-radius:19px;
      }

      .cat-visual img{
        max-width:84%;
      }

      .board-actions{
        gap:12px;
        margin-top:2px;
      }
    }

    @media (orientation:landscape){
      .page{
        min-height:100dvh;
        padding:8px 14px calc(var(--footer-space-l) + var(--safe-bottom));
      }

      .portrait-only{ display:none !important; }
      .landscape-only{ display:flex !important; }

      .shell{
        width:min(100%, 1800px);
        padding-top:10px;
        gap:10px;
      }

      .top-strip{
        width:min(100%, 1780px);
        min-height:74px;
        padding:8px 14px;
        border-radius:28px;
      }

      .strip-title{
        min-width:108px;
      }

      .strip-title-text{
        font-size:30px;
      }

      .strip-logo img{
        width:96px;
      }

      .score-chip{
        min-width:124px;
        max-width:210px;
        min-height:42px;
        border-width:3px;
        box-shadow:0 5px 0 rgba(0,0,0,.16);
        padding:4px 8px;
      }

      .score-chip-name{
        font-size:17px;
        transform:translateY(-1px);
      }

      .score-chip-num{
        width:30px;
        height:30px;
        font-size:15px;
      }

      .board{
        width:min(100%, var(--board-width-l));
        grid-template-columns:repeat(4, minmax(0, 1fr));
        gap:var(--board-gap-l);
        padding:var(--board-pad-l);
        border-radius:var(--board-radius-l);
      }

      .cat[data-key="hkm"]{
        --card-h: var(--hkm-card-h-l);
        --img-h: var(--hkm-img-h-l);
        --title-h: var(--hkm-title-h-l);
        --title-size: var(--hkm-title-size-l);
        --title-y: var(--hkm-title-y-l);
      }

      .cat[data-key="random"]{
        --card-h: var(--random-card-h-l);
        --img-h: var(--random-img-h-l);
        --title-h: var(--random-title-h-l);
        --title-size: var(--random-title-size-l);
        --title-y: var(--random-title-y-l);
      }

      .cat[data-key="ram"]{
        --card-h: var(--ram-card-h-l);
        --img-h: var(--ram-img-h-l);
        --title-h: var(--ram-title-h-l);
        --title-size: var(--ram-title-size-l);
        --title-y: var(--ram-title-y-l);
      }

      .cat[data-key="spacetoon"]{
        --card-h: var(--spacetoon-card-h-l);
        --img-h: var(--spacetoon-img-h-l);
        --title-h: var(--spacetoon-title-h-l);
        --title-size: var(--spacetoon-title-size-l);
        --title-y: var(--spacetoon-title-y-l);
      }

      .cat[data-key="job"]{
        --card-h: var(--job-card-h-l);
        --img-h: var(--job-img-h-l);
        --title-h: var(--job-title-h-l);
        --title-size: var(--job-title-size-l);
        --title-y: var(--job-title-y-l);
      }

      .cat[data-key="kit"]{
        --card-h: var(--kit-card-h-l);
        --img-h: var(--kit-img-h-l);
        --title-h: var(--kit-title-h-l);
        --title-size: var(--kit-title-size-l);
        --title-y: var(--kit-title-y-l);
      }

      .cat[data-key="song"]{
        --card-h: var(--song-card-h-l);
        --img-h: var(--song-img-h-l);
        --title-h: var(--song-title-h-l);
        --title-size: var(--song-title-size-l);
        --title-y: var(--song-title-y-l);
      }

      .cat[data-key="place"]{
        --card-h: var(--place-card-h-l);
        --img-h: var(--place-img-h-l);
        --title-h: var(--place-title-h-l);
        --title-size: var(--place-title-size-l);
        --title-y: var(--place-title-y-l);
      }

      .cat{
        border-width:4px;
        border-radius:20px;
        box-shadow:0 5px 0 rgba(0,0,0,.24);
        padding:6px 8px 5px;
      }

      .cat.selected{
        box-shadow:
          0 0 0 5px rgba(246,211,122,.82),
          0 0 0 10px rgba(246,211,122,.18),
          0 5px 0 rgba(0,0,0,.24);
      }

      .cat.selected::after{
        inset:6px;
        border-radius:15px;
      }

      .cat-visual img{
        max-width:78%;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="floaters" aria-hidden="true">
      <span class="floater f1"></span>
      <span class="floater f2"></span>
      <span class="floater f3"></span>
      <span class="floater f4"></span>
    </div>

    <main class="shell">
      <section class="top-strip" aria-label="معلومات اللعبة">
        <div class="strip-title" aria-hidden="true">
          <div class="strip-title-text">
            <span class="word-top">بدون</span>
            <span class="word-bottom">كلام</span>
          </div>
        </div>

        <div class="strip-scores" aria-label="نتائج الفريقين">
          <div class="score-chip">
            <div class="score-chip-name" id="team1Name">الفريق الأول</div>
            <div class="score-chip-num"><span id="team1Score">0</span></div>
          </div>

          <div class="score-chip">
            <div class="score-chip-name" id="team2Name">الفريق الثاني</div>
            <div class="score-chip-num"><span id="team2Score">0</span></div>
          </div>
        </div>

        <div class="strip-logo" aria-label="صندوق المسابقات">
          <img src="logo.PNG" alt="صندوق المسابقات">
        </div>
      </section>

      <section class="board" aria-label="الكتاغوريات">
        <button class="cat" type="button" data-key="random" data-name="جميع الأقسام">
          <div class="cat-title">جميع الأقسام<span class="cat-subtitle">(عشوائي)</span></div>
          <div class="cat-visual"><img src="random.PNG" alt="جميع الأقسام"></div>
        </button>

        <button class="cat" type="button" data-key="hkm" data-name="حكم وأمثال">
          <div class="cat-title">حكم وأمثال</div>
          <div class="cat-visual"><img src="hkm.PNG" alt="حكم وأمثال"></div>
        </button>

        <button class="cat" type="button" data-key="ram" data-name="مسلسلات رمضانية">
          <div class="cat-title">مسلسلات رمضانية</div>
          <div class="cat-visual"><img src="ram.PNG" alt="مسلسلات رمضانية"></div>
        </button>

        <button class="cat" type="button" data-key="spacetoon" data-name="سبيستون">
          <div class="cat-title">سبيستون</div>
          <div class="cat-visual"><img src="spacetoon.PNG" alt="سبيستون"></div>
        </button>

        <button class="cat" type="button" data-key="job" data-name="وظائف ومهن">
          <div class="cat-title">وظائف ومهن</div>
          <div class="cat-visual"><img src="job.PNG" alt="وظائف ومهن"></div>
        </button>

        <button class="cat" type="button" data-key="kit" data-name="أدوات المطبخ">
          <div class="cat-title">أدوات المطبخ</div>
          <div class="cat-visual"><img src="kit.PNG" alt="أدوات المطبخ"></div>
        </button>

        <button class="cat" type="button" data-key="song" data-name="أغاني">
          <div class="cat-title">أغاني</div>
          <div class="cat-visual"><img src="song.PNG" alt="أغاني"></div>
        </button>

        <button class="cat" type="button" data-key="place" data-name="أماكن ومواقع">
          <div class="cat-title">أماكن ومواقع</div>
          <div class="cat-visual"><img src="place.PNG" alt="أماكن ومواقع"></div>
        </button>
      </section>

      <div class="board-actions portrait-only">
        <button class="home-inline" id="homeBtnPortrait" type="button" aria-label="الرئيسية" title="الرئيسية">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 3.2 3.2 10.5a1 1 0 0 0 .64 1.77h1.41v7.05A1.68 1.68 0 0 0 6.93 21h3.74a1 1 0 0 0 1-1v-4.1h.66V20a1 1 0 0 0 1 1h3.74a1.68 1.68 0 0 0 1.68-1.68v-7.05h1.41a1 1 0 0 0 .64-1.77L12 3.2z"/>
          </svg>
        </button>

        <button class="start-inline" id="startBtnPortrait" type="button" disabled>التالي</button>

        <div class="board-actions-spacer" aria-hidden="true"></div>
      </div>
    </main>

    <button class="home-btn landscape-only" id="homeBtnLandscape" type="button" aria-label="الرئيسية" title="الرئيسية">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 3.2 3.2 10.5a1 1 0 0 0 .64 1.77h1.41v7.05A1.68 1.68 0 0 0 6.93 21h3.74a1 1 0 0 0 1-1v-4.1h.66V20a1 1 0 0 0 1 1h3.74a1.68 1.68 0 0 0 1.68-1.68v-7.05h1.41a1 1 0 0 0 .64-1.77L12 3.2z"/>
      </svg>
    </button>

    <button class="start-btn landscape-only" id="startBtnLandscape" type="button" disabled>التالي</button>
  </div>

  <script>
    const cards = Array.from(document.querySelectorAll(".cat"));
    const startBtnPortrait = document.getElementById("startBtnPortrait");
    const startBtnLandscape = document.getElementById("startBtnLandscape");
    const homeBtnPortrait = document.getElementById("homeBtnPortrait");
    const homeBtnLandscape = document.getElementById("homeBtnLandscape");

    const team1NameEl = document.getElementById("team1Name");
    const team2NameEl = document.getElementById("team2Name");
    const team1ScoreEl = document.getElementById("team1Score");
    const team2ScoreEl = document.getElementById("team2Score");

    const savedKey = sessionStorage.getItem("bdonKalam_categoryKey") || "";
    let selectedKey = savedKey;

    const RANDOM_POOL_KEY = "bdonKalam_randomPool_v1";
    const RANDOM_INDEX_KEY = "bdonKalam_randomIndex_v1";
    const RANDOM_MODE_KEY = "bdonKalam_randomMode_v1";
    const RANDOM_SESSION_KEY = "bdonKalam_randomSessionId_v1";

    const RANDOM_SOURCE_CATEGORIES = [
      { key: "hkm", name: "حكم وأمثال", count: 30 },
      { key: "ram", name: "مسلسلات رمضانية", count: 30 },
      { key: "spacetoon", name: "سبيستون", count: 30 },
      { key: "job", name: "وظائف ومهن", count: 30 },
      { key: "kit", name: "أدوات المطبخ", count: 30 },
      { key: "song", name: "أغاني", count: 30 },
      { key: "place", name: "أماكن ومواقع", count: 30 }
    ];

    function loadHeaderData() {
      const team1 = sessionStorage.getItem("bdonKalam_team1") || "الفريق الأول";
      const team2 = sessionStorage.getItem("bdonKalam_team2") || "الفريق الثاني";
      const score1 = sessionStorage.getItem("bdonKalam_score1") || "0";
      const score2 = sessionStorage.getItem("bdonKalam_score2") || "0";

      team1NameEl.textContent = team1;
      team2NameEl.textContent = team2;
      team1ScoreEl.textContent = score1;
      team2ScoreEl.textContent = score2;
    }

    function setStartDisabled(disabled) {
      [startBtnPortrait, startBtnLandscape].forEach(btn => {
        if (btn) btn.disabled = disabled;
      });
    }

    function applySelection(key) {
      selectedKey = key || "";
      cards.forEach(card => {
        card.classList.toggle("selected", card.dataset.key === selectedKey);
      });
      setStartDisabled(!selectedKey);
    }

    function clearRandomMode() {
      sessionStorage.removeItem(RANDOM_POOL_KEY);
      sessionStorage.removeItem(RANDOM_INDEX_KEY);
      sessionStorage.removeItem(RANDOM_MODE_KEY);
      sessionStorage.removeItem(RANDOM_SESSION_KEY);
    }

    function buildRandomPool() {
      const pool = [];

      RANDOM_SOURCE_CATEGORIES.forEach(category => {
        for (let i = 1; i <= category.count; i++) {
          pool.push({
            key: category.key,
            name: category.name,
            number: i
          });
        }
      });

      for (let i = pool.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [pool[i], pool[j]] = [pool[j], pool[i]];
      }

      return pool;
    }

    function startRandomMode() {
      const pool = buildRandomPool();

      sessionStorage.setItem("bdonKalam_categoryKey", "random");
      sessionStorage.setItem("bdonKalam_categoryName", "جميع الأقسام");
      sessionStorage.setItem(RANDOM_MODE_KEY, "1");
      sessionStorage.setItem(RANDOM_POOL_KEY, JSON.stringify(pool));
      sessionStorage.setItem(RANDOM_INDEX_KEY, "0");
      sessionStorage.setItem(RANDOM_SESSION_KEY, String(Date.now()));
      sessionStorage.removeItem("bdonKalam_selectedNumber");

      window.location.href = "barcode.html?mode=random";
    }

    function goNext() {
      if (!selectedKey) return;

      if (selectedKey === "random") {
        startRandomMode();
        return;
      }

      window.location.href = "numbers.html";
    }

    function goHome() {
      window.location.href = "index.html";
    }

    cards.forEach(card => {
      card.addEventListener("click", () => {
        const key = card.dataset.key;
        const name = card.dataset.name;

        if (key === "random") {
          startRandomMode();
          return;
        }

        clearRandomMode();
        sessionStorage.setItem("bdonKalam_categoryKey", key);
        sessionStorage.setItem("bdonKalam_categoryName", name);
        sessionStorage.removeItem("bdonKalam_selectedNumber");

        applySelection(key);
      });
    });

    [startBtnPortrait, startBtnLandscape].forEach(btn => {
      if (btn) btn.addEventListener("click", goNext);
    });

    [homeBtnPortrait, homeBtnLandscape].forEach(btn => {
      if (btn) btn.addEventListener("click", goHome);
    });

    loadHeaderData();

    if (savedKey === "random") {
      applySelection("");
    } else {
      applySelection(savedKey);
    }
  </script>
</body>
</html>
