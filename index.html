<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>بدون كلام</title>

  <style>
    @font-face{
      font-family:"Estedad";
      src:url("Estedad-Bold.ttf") format("truetype");
      font-style:normal;
      font-weight:700;
      font-display:swap;
    }

    :root{
      --bg:#083b73;
      --gold:#f4b512;
      --white:#f6f6f6;
      --purple:#4658c8;
      --green:#08c968;
      --black:#101010;
      --input-bg:#f3f3f3;
      --input-line:#000000;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
      font-family:"Estedad", Tahoma, Arial, "Segoe UI", sans-serif;
    }

    html,body{
      margin:0;
      min-height:100%;
      background:var(--bg);
      color:var(--white);
    }

    body{
      min-height:100vh;
      overflow-x:hidden;
    }

    .page{
      position:relative;
      min-height:100vh;
      background:var(--bg);
      overflow:hidden;
      padding:12px 14px 90px;
    }

    .top-logo{
      position:absolute;
      top:10px;
      left:10px;
      z-index:3;
      user-select:none;
      pointer-events:none;
    }

    .top-logo img{
      width:min(125px, 24vw);
      height:auto;
      display:block;
    }

    .shell{
      width:min(100%, 980px);
      min-height:calc(100vh - 40px);
      margin:0 auto;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      gap:18px;
      padding-top:96px;
      position:relative;
      z-index:2;
    }

    .title{
      margin:0;
      color:var(--gold);
      font-weight:700;
      line-height:1;
      text-align:center;
      font-size:clamp(68px, 13vw, 150px);
      letter-spacing:.2px;
    }

    .center{
      width:min(100%, 700px);
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:34px;
      margin-top:16px;
    }

    .field{
      width:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:14px;
    }

    .label{
      font-size:clamp(28px, 5vw, 48px);
      font-weight:700;
      color:var(--white);
      text-align:center;
      line-height:1.2;
    }

    .input{
      width:100%;
      height:84px;
      border-radius:30px;
      border:7px solid var(--input-line);
      background:var(--input-bg);
      color:#0f2540;
      font-size:30px;
      font-weight:700;
      text-align:center;
      outline:none;
      padding:0 20px;
      box-shadow:0 8px 0 rgba(0,0,0,.14);
    }

    .input::placeholder{
      color:#9a9a9a;
      font-weight:700;
    }

    .btns{
      width:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:26px;
      margin-top:12px;
    }

    .btn{
      border:none;
      outline:none;
      cursor:pointer;
      color:#fff;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      user-select:none;
      line-height:1;
      transition:transform .12s ease, opacity .12s ease, filter .12s ease;
      font-weight:700;
    }

    .btn:active{
      transform:translateY(2px) scale(.99);
    }

    .btn-help{
      min-width:285px;
      padding:17px 36px 19px;
      border-radius:30px;
      background:var(--purple);
      border:6px solid #ececec;
      box-shadow:0 5px 0 rgba(0,0,0,.35);
      font-size:clamp(26px, 5vw, 42px);
    }

    .btn-start{
      min-width:275px;
      padding:18px 40px 20px;
      border-radius:30px;
      background:var(--green);
      border:5px solid #000;
      box-shadow:none;
      font-size:clamp(34px, 6vw, 54px);
    }

    .btn-start[disabled]{
      opacity:.55;
      cursor:not-allowed;
      filter:grayscale(.15);
    }

    .person-wrap{
      position:absolute;
      left:0;
      bottom:0;
      z-index:1;
      pointer-events:none;
      user-select:none;
    }

    .person-wrap img{
      width:min(340px, 43vw);
      height:auto;
      display:block;
    }

    .footer{
      position:absolute;
      right:12px;
      bottom:12px;
      z-index:2;
      color:#fff;
      font-weight:700;
      font-size:clamp(14px, 2.8vw, 28px);
      text-align:right;
      white-space:nowrap;
    }

    .modal{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.55);
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      z-index:20;
    }

    .modal.show{
      display:flex;
    }

    .modal-card{
      width:min(680px, 100%);
      background:#113f79;
      border:5px solid var(--gold);
      border-radius:28px;
      box-shadow:0 14px 40px rgba(0,0,0,.35);
      padding:22px 18px 18px;
      text-align:right;
    }

    .modal-title{
      margin:0 0 12px;
      color:var(--gold);
      text-align:center;
      font-size:clamp(28px, 5vw, 42px);
      font-weight:700;
    }

    .modal-text{
      margin:0;
      color:#fff;
      line-height:1.9;
      font-size:clamp(16px, 3.7vw, 24px);
      font-weight:700;
    }

    .modal-actions{
      display:flex;
      justify-content:center;
      margin-top:18px;
    }

    .close-btn{
      border:none;
      background:var(--green);
      color:#fff;
      font-weight:700;
      font-size:24px;
      min-width:170px;
      border-radius:20px;
      padding:12px 20px;
      border:4px solid #000;
      box-shadow:0 5px 0 #000;
      cursor:pointer;
    }

    @media (max-width:700px){
      .page{
        padding:10px 14px 86px;
      }

      .shell{
        padding-top:108px;
        gap:16px;
      }

      .center{
        width:min(100%, 640px);
        gap:30px;
      }

      .label{
        font-size:clamp(24px, 5.2vw, 40px);
      }

      .input{
        height:76px;
        font-size:27px;
        border-width:6px;
      }

      .btn-help{
        min-width:250px;
      }

      .btn-start{
        min-width:240px;
      }

      .person-wrap img{
        width:min(310px, 46vw);
      }
    }

    @media (orientation:landscape){
      .page{
        padding:10px 18px 28px;
      }

      .top-logo{
        top:10px;
        left:10px;
      }

      .top-logo img{
        width:120px;
      }

      .shell{
        min-height:calc(100vh - 20px);
        padding-top:74px;
        gap:10px;
      }

      .title{
        font-size:clamp(56px, 8vw, 110px);
      }

      .center{
        width:min(100%, 760px);
        gap:18px;
        margin-top:6px;
      }

      .field{
        gap:8px;
      }

      .label{
        font-size:clamp(18px, 2.8vw, 34px);
      }

      .input{
        height:62px;
        font-size:24px;
        border-width:5px;
        border-radius:24px;
      }

      .btns{
        gap:16px;
        margin-top:8px;
      }

      .btn-help{
        min-width:220px;
        padding:13px 28px 15px;
        font-size:clamp(20px, 3vw, 34px);
      }

      .btn-start{
        min-width:220px;
        padding:13px 32px 15px;
        font-size:clamp(22px, 3.2vw, 38px);
      }

      .person-wrap img{
        width:min(230px, 23vw);
      }

      .footer{
        font-size:clamp(12px, 1.6vw, 22px);
        right:16px;
        bottom:10px;
      }
    }

    @media (orientation:landscape) and (max-height:500px){
      .shell{
        padding-top:58px;
      }

      .title{
        font-size:58px;
      }

      .input{
        height:54px;
      }

      .btn-help,
      .btn-start{
        padding-top:11px;
        padding-bottom:13px;
      }

      .person-wrap img{
        width:180px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="top-logo" aria-label="صندوق المسابقات">
      <img src="logo.PNG" alt="صندوق المسابقات">
    </div>

    <main class="shell">
      <h1 class="title">بدون كلام</h1>

      <section class="center">
        <div class="field">
          <label class="label" for="team1">اسم الفريق الأول</label>
          <input id="team1" class="input" type="text" maxlength="18" autocomplete="off" />
        </div>

        <div class="field">
          <label class="label" for="team2">اسم الفريق الثاني</label>
          <input id="team2" class="input" type="text" maxlength="18" autocomplete="off" />
        </div>

        <div class="btns">
          <button id="helpBtn" class="btn btn-help" type="button">التعليمات</button>
          <button id="startBtn" class="btn btn-start" type="button">ابدأ</button>
        </div>
      </section>
    </main>

    <div class="person-wrap" aria-hidden="true">
      <img src="boy.PNG" alt="">
    </div>

    <div class="footer">جميع الحقوق محفوظة © صندوق المسابقات 2026</div>
  </div>

  <div id="helpModal" class="modal" aria-hidden="true">
    <div class="modal-card">
      <h2 class="modal-title">التعليمات</h2>
      <p class="modal-text">
        اكتب اسم الفريق الأول واسم الفريق الثاني ثم اضغط ابدأ. بعد ذلك تختارون القسم،
        ثم تختارون رقمًا من اللوحة. اللاعب يرى الشيء المطلوب ويمثله لفريقه بدون أي كلام،
        والمقدم يحتسب النقطة للفريق الصحيح.
      </p>

      <div class="modal-actions">
        <button id="closeHelpBtn" class="close-btn" type="button">إغلاق</button>
      </div>
    </div>
  </div>

  <script>
    const team1Input = document.getElementById("team1");
    const team2Input = document.getElementById("team2");
    const startBtn = document.getElementById("startBtn");
    const helpBtn = document.getElementById("helpBtn");
    const helpModal = document.getElementById("helpModal");
    const closeHelpBtn = document.getElementById("closeHelpBtn");

    team1Input.value = sessionStorage.getItem("bdonKalam_team1") || "";
    team2Input.value = sessionStorage.getItem("bdonKalam_team2") || "";

    function saveTeams() {
      sessionStorage.setItem("bdonKalam_team1", team1Input.value.trim());
      sessionStorage.setItem("bdonKalam_team2", team2Input.value.trim());
    }

    team1Input.addEventListener("input", saveTeams);
    team2Input.addEventListener("input", saveTeams);

    helpBtn.addEventListener("click", () => {
      helpModal.classList.add("show");
      helpModal.setAttribute("aria-hidden", "false");
    });

    closeHelpBtn.addEventListener("click", () => {
      helpModal.classList.remove("show");
      helpModal.setAttribute("aria-hidden", "true");
    });

    helpModal.addEventListener("click", (e) => {
      if (e.target === helpModal) {
        helpModal.classList.remove("show");
        helpModal.setAttribute("aria-hidden", "true");
      }
    });

    startBtn.addEventListener("click", () => {
      const team1 = team1Input.value.trim();
      const team2 = team2Input.value.trim();

      if (!team1 || !team2) {
        alert("اكتب اسم الفريقين أولاً");
        return;
      }

      sessionStorage.setItem("bdonKalam_team1", team1);
      sessionStorage.setItem("bdonKalam_team2", team2);
      sessionStorage.setItem("bdonKalam_score1", "0");
      sessionStorage.setItem("bdonKalam_score2", "0");
      window.location.href = "categories.html";
    });
  </script>
</body>
</html>
