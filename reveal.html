<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>عرض الصورة</title>

  <style id="auth-gate-style">
    body{visibility:hidden !important;}
  </style>
  <script>
    (function () {
      const ACTIVATE_URL = "activate.html";
      const API_ME_URL = window.location.origin + "/api/me";
      const HIDE_STYLE_ID = "auth-gate-style";

      const TOKEN_KEYS = [
        "bdonKalam_token_v1",
        "bdonKalam_token",
        "sandooq_token_v1",
        "sandooq_token",
        "token"
      ];

      const EMAIL_KEYS = [
        "bdonKalam_email_v1",
        "bdonKalam_email",
        "sandooq_email",
        "user_email",
        "email"
      ];

      function readAny(keys) {
        for (const key of keys) {
          try {
            const value = localStorage.getItem(key) || sessionStorage.getItem(key);
            if (value && String(value).trim()) return String(value).trim();
          } catch (_) {}
        }
        return "";
      }

      function writeSafe(key, value) {
        if (!value) return;
        try { localStorage.setItem(key, value); } catch (_) {}
        try { sessionStorage.setItem(key, value); } catch (_) {}
      }

      function revealPage() {
        const gateStyle = document.getElementById(HIDE_STYLE_ID);
        if (gateStyle) gateStyle.remove();
      }

      function redirectToActivate() {
        location.replace(ACTIVATE_URL);
      }

      function isActivated(data) {
        return !!(
          data?.activated === true ||
          data?.is_activated === true ||
          data?.isActivated === true ||
          data?.user?.activated === true ||
          data?.user?.is_activated === true ||
          data?.user?.isActivated === true ||
          data?.status === "activated"
        );
      }

      async function checkAuthGate() {
        const token = readAny(TOKEN_KEYS);
        if (!token) {
          redirectToActivate();
          return;
        }

        try {
          const response = await fetch(API_ME_URL, {
            method: "GET",
            headers: {
              Authorization: "Bearer " + token
            },
            cache: "no-store"
          });

          let data = {};
          try {
            data = await response.json();
          } catch (_) {}

          if (!response.ok || !isActivated(data)) {
            redirectToActivate();
            return;
          }

          const email = String(
            data?.email ||
            data?.user?.email ||
            readAny(EMAIL_KEYS) ||
            ""
          ).trim().toLowerCase();

          if (email) {
            writeSafe("bdonKalam_email_v1", email);
          }

          if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", revealPage, { once: true });
          } else {
            revealPage();
          }
        } catch (_) {
          redirectToActivate();
        }
      }

      checkAuthGate();
    })();
  </script>

  <style>
    html,body{
      margin:0;
      width:100%;
      min-height:100%;
      background:#000;
    }

    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }

    #revealImage{
      width:100vw;
      height:100vh;
      object-fit:contain;
      display:block;
      background:#000;
    }

    #errorBox{
      display:none;
      color:#fff;
      font:700 20px Tahoma, Arial, sans-serif;
      text-align:center;
      padding:24px;
      line-height:1.8;
    }

    #errorBox.show{
      display:block;
    }
  </style>
</head>
<body>
  <img id="revealImage" alt="صورة السؤال">
  <div id="errorBox">الصورة غير موجودة</div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const cat = String(params.get("cat") || "hkm").trim();
    const num = String(params.get("num") || "1").trim();

    const revealImage = document.getElementById("revealImage");
    const errorBox = document.getElementById("errorBox");

    const candidates = [
      `images/${cat}/${num}.PNG`,
      `images/${cat}/${num}.png`,
      `images/${cat}/${num}.JPG`,
      `images/${cat}/${num}.jpg`,
      `images/${cat}/${num}.JPEG`,
      `images/${cat}/${num}.jpeg`,
      `images/${cat}/${num}.WEBP`,
      `images/${cat}/${num}.webp`
    ];

    let currentIndex = 0;

    function showError() {
      revealImage.style.display = "none";
      errorBox.classList.add("show");
    }

    revealImage.addEventListener("load", () => {
      errorBox.classList.remove("show");
      revealImage.style.display = "block";
    });

    revealImage.addEventListener("error", () => {
      currentIndex += 1;
      if (currentIndex >= candidates.length) {
        showError();
        return;
      }
      revealImage.src = candidates[currentIndex];
    });

    revealImage.src = candidates[currentIndex];
  </script>
</body>
</html>
