<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>لعبة بدون كلام - الكتاغوريات</title>

  <style>
    @font-face{
      font-family:"Estedad";
      src:url("Estedad-Bold.ttf") format("truetype");
      font-style:normal;
      font-weight:700;
      font-display:swap;
    }

    :root{
      --bg:#f7efd8;
      --bg-2:#f2e7c8;
      --dot:#e7d8ae;
      --ink:#18131d;
      --white:#fffdf7;

      --panel:#f8efd6;
      --panel-2:#f0e0b9;

      --gold:#f2b84a;
      --gold-dark:#d9981e;

      --blue:#8ecbff;
      --blue-2:#67b8ff;
      --blue-dark:#2d3f68;

      /* ✅ تم تغميق خلفية بطاقات الصور قليلاً */
      --card-bg:#CDB295;
      --selected:#f8e2a0;

      --black:#101010;
      --line:#1d1922;
      --shadow:#17131d;
      --safe-bottom: env(safe-area-inset-bottom, 0px);

      --game-title-size-p: 62px;
      --game-title-x-p: 0px;
      --game-title-y-p: -6px;

      --game-title-size-l: 42px;
      --game-title-x-l: 0px;
      --game-title-y-l: -2px;

      --start-width-p: 280px;
      --start-height-p: 74px;
      --start-font-p: 34px;
      --start-x-p: 0px;
      --start-y-p: 0px;
      --start-bottom-p: 18px;

      --start-width-l: 420px;
      --start-height-l: 56px;
      --start-font-l: 26px;
      --start-x-l: 0px;
      --start-y-l: 0px;
      --start-bottom-l: 14px;

      --home-size-p: 76px;
      --home-icon-size-p: 32px;
      --home-x-p: 0px;
      --home-y-p: 0px;
      --home-left-p: 18px;
      --home-bottom-p: 18px;

      --home-size-l: 66px;
      --home-icon-size-l: 30px;
      --home-x-l: 0px;
      --home-y-l: 0px;
      --home-left-l: 20px;
      --home-bottom-l: 14px;

      --footer-space-p: 136px;
      --footer-space-l: 96px;

      --board-width-p: 820px;
      --board-width-l: 1720px;
      --board-gap-p: 16px;
      --board-gap-l: 16px;
      --board-pad-p: 16px;
      --board-pad-l: 14px;
      --board-radius-p: 34px;
      --board-radius-l: 34px;

      --hkm-card-h-p: 210px;
      --hkm-img-h-p: 104px;
      --hkm-title-h-p: 44px;
      --hkm-title-size-p: 28px;
      --hkm-title-y-p: 0px;

      --hkm-card-h-l: 168px;
      --hkm-img-h-l: 96px;
      --hkm-title-h-l: 34px;
      --hkm-title-size-l: 26px;
      --hkm-title-y-l: 0px;

      --hkm-scale: 2.00;
      --hkm-y: 6px;

      --ram-card-h-p: 210px;
      --ram-img-h-p: 104px;
      --ram-title-h-p: 44px;
      --ram-title-size-p: 28px;
      --ram-title-y-p: 0px;

      --ram-card-h-l: 168px;
      --ram-img-h-l: 96px;
      --ram-title-h-l: 34px;
      --ram-title-size-l: 26px;
      --ram-title-y-l: 0px;

      --ram-scale: 2.00;
      --ram-y: 4px;

      --job-card-h-p: 210px;
      --job-img-h-p: 104px;
      --job-title-h-p: 44px;
      --job-title-size-p: 28px;
      --job-title-y-p: 0px;

      --job-card-h-l: 168px;
      --job-img-h-l: 96px;
      --job-title-h-l: 34px;
      --job-title-size-l: 26px;
      --job-title-y-l: 0px;

      --job-scale: 2.05;
      --job-y: 6px;

      --kit-card-h-p: 210px;
      --kit-img-h-p: 104px;
      --kit-title-h-p: 44px;
      --kit-title-size-p: 28px;
      --kit-title-y-p: 0px;

      --kit-card-h-l: 168px;
      --kit-img-h-l: 96px;
      --kit-title-h-l: 34px;
      --kit-title-size-l: 26px;
      --kit-title-y-l: 0px;

      --kit-scale: 1.95;
      --kit-y: 6px;

      --song-card-h-p: 210px;
      --song-img-h-p: 104px;
      --song-title-h-p: 44px;
      --song-title-size-p: 28px;
      --song-title-y-p: 0px;

      --song-card-h-l: 168px;
      --song-img-h-l: 96px;
      --song-title-h-l: 34px;
      --song-title-size-l: 26px;
      --song-title-y-l: 0px;

      --song-scale: 2.00;
      --song-y: 8px;

      --place-card-h-p: 210px;
      --place-img-h-p: 82px;
      --place-title-h-p: 44px;
      --place-title-size-p: 28px;
      --place-title-y-p: 0px;

      --place-card-h-l: 168px;
      --place-img-h-l: 76px;
      --place-title-h-l: 34px;
      --place-title-size-l: 26px;
      --place-title-y-l: 0px;

      --place-scale: 2.90;
      --place-y: 12px;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
      font-family:"Estedad", Tahoma, Arial, "Segoe UI", sans-serif;
    }

    html,body{
      margin:0;
      min-height:100%;
      background:var(--bg);
      color:var(--ink);
    }

    body{
      min-height:100vh;
      overflow-x:hidden;
    }

    .page{
      position:relative;
      min-height:100dvh;
      overflow-x:hidden;
      overflow-y:auto;
      padding:14px 14px calc(var(--footer-space-p) + var(--safe-bottom));
      background:
        radial-gradient(circle at 18% 18%, rgba(255,255,255,.34), transparent 18%),
        radial-gradient(circle at 83% 16%, rgba(255,255,255,.22), transparent 18%),
        radial-gradient(circle at 62% 82%, rgba(255,255,255,.16), transparent 20%),
        linear-gradient(180deg, var(--bg), #f9f1dc 100%);
    }

    .page::before{
      content:"";
      position:absolute;
      inset:-180px;
      background-image:radial-gradient(var(--dot) 34%, transparent 36%);
      background-size:36px 36px;
      opacity:.68;
      animation:patternDiagonal 8s linear infinite;
      pointer-events:none;
      z-index:0;
    }

    .page::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(135deg, rgba(255,255,255,.08) 0%, transparent 30%),
        linear-gradient(315deg, rgba(255,255,255,.05) 0%, transparent 24%);
      pointer-events:none;
      z-index:0;
    }

    .floaters{
      position:absolute;
      inset:0;
      z-index:0;
      pointer-events:none;
      overflow:hidden;
    }

    .floater{
      position:absolute;
      border-radius:50%;
      animation:floaty 4.4s ease-in-out infinite;
      opacity:.5;
    }

    .floater.f1{
      width:14px;
      height:14px;
      top:15%;
      left:10%;
      background:#fff;
      box-shadow:0 0 0 5px rgba(255,255,255,.18);
    }

    .floater.f2{
      width:10px;
      height:10px;
      top:42%;
      left:8%;
      background:#fff;
      box-shadow:0 0 0 4px rgba(255,255,255,.12);
      animation-delay:-1s;
    }

    .floater.f3{
      width:12px;
      height:12px;
      bottom:17%;
      right:14%;
      background:#fff6cc;
      box-shadow:0 0 0 4px rgba(255,246,204,.18);
      animation-delay:-2s;
    }

    .floater.f4{
      width:9px;
      height:9px;
      top:28%;
      right:12%;
      background:#fff;
      box-shadow:0 0 0 3px rgba(255,255,255,.12);
      animation-delay:-3s;
    }

    .shell{
      width:min(100%, 980px);
      margin:0 auto;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:16px;
      padding-top:18px;
      position:relative;
      z-index:2;
    }

    .top-strip{
      width:min(100%, 960px);
      min-height:108px;
      background:linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
      border:4px solid var(--line);
      border-radius:34px;
      box-shadow:0 10px 0 rgba(0,0,0,.28);
      padding:14px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
    }

    .strip-title{
      min-width:140px;
      display:flex;
      justify-content:flex-start;
      align-items:center;
    }

    .strip-title-text{
      display:inline-flex;
      flex-direction:column;
      align-items:center;
      line-height:.84;
      color:#11101a;
      font-size:clamp(34px, 6vw, 54px);
      letter-spacing:-.5px;
      transform:rotate(-6deg);
      text-shadow:
        -4px -4px 0 #fff,
         4px -4px 0 #fff,
        -4px  4px 0 #fff,
         4px  4px 0 #fff,
         0   -4px 0 #fff,
         0    4px 0 #fff,
        -4px  0   0 #fff,
         4px  0   0 #fff,
         0    7px 0 rgba(0,0,0,.05);
      filter:drop-shadow(0 6px 0 rgba(0,0,0,.04));
      user-select:none;
      pointer-events:none;
    }

    .strip-title-text .word-top{
      transform:translateY(-6px);
    }

    .strip-title-text .word-bottom{
      transform:translateY(2px);
    }

    .strip-scores{
      flex:1 1 auto;
      min-width:0;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .score-chip{
      min-width:150px;
      max-width:260px;
      min-height:58px;
      padding:8px 12px;
      border-radius:22px;
      border:3px solid var(--line);
      background:linear-gradient(180deg, #fffdf8 0%, #f4ecd0 100%);
      box-shadow:0 6px 0 rgba(0,0,0,.18);
      display:flex;
      align-items:center;
      gap:10px;
      justify-content:space-between;
    }

    .score-chip-name{
      flex:1 1 auto;
      min-width:0;
      color:#173e73;
      font-size:22px;
      line-height:1.15;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      text-align:right;
      display:flex;
      align-items:center;
      min-height:100%;
      padding-bottom:0;
      transform:translateY(-1px);
    }

    .score-chip-num{
      width:38px;
      height:38px;
      border-radius:14px;
      border:3px solid var(--line);
      background:var(--gold);
      box-shadow:0 4px 0 rgba(0,0,0,.16);
      color:#3f2b0c;
      display:flex;
      align-items:center;
      justify-content:center;
      flex:0 0 auto;
      padding:0;
      direction:ltr;
      text-align:center;
      line-height:1;
      font-weight:700;
      font-variant-numeric:tabular-nums;
    }

    .score-chip-num span{
      display:block;
      line-height:1;
      transform:translateY(0);
    }

    .strip-logo{
      min-width:110px;
      display:flex;
      justify-content:flex-end;
      align-items:center;
      user-select:none;
      pointer-events:none;
      filter:drop-shadow(0 4px 0 rgba(255,255,255,.38));
    }

    .strip-logo img{
      width:min(146px, 30vw);
      height:auto;
      display:block;
    }

    .board{
      width:min(100%, var(--board-width-p));
      background:linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
      border:4px solid var(--line);
      border-radius:var(--board-radius-p);
      padding:var(--board-pad-p);
      box-shadow:0 10px 0 rgba(0,0,0,.28);
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:var(--board-gap-p);
    }

    .cat{
      appearance:none;
      border:none;
      background:var(--card-bg);
      border:6px solid #000;
      border-radius:28px;
      box-shadow:0 8px 0 rgba(0,0,0,.28);
      cursor:pointer;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      gap:2px;
      transition:transform .12s ease, background .12s ease, border-color .12s ease, box-shadow .12s ease;
      padding:8px 8px 6px;
      height:var(--card-h);
      overflow:hidden;
    }

    .cat:active{
      transform:translateY(2px) scale(.99);
    }

    .cat.selected{
      background:var(--selected);
      border-color:var(--gold);
      box-shadow:0 0 0 4px rgba(244,181,18,.22), 0 8px 0 rgba(0,0,0,.28);
    }

    .cat-title{
      width:100%;
      text-align:center;
      color:#12233f;
      font-weight:700;
      line-height:1.12;
      min-height:var(--title-h);
      display:flex;
      align-items:flex-start;
      justify-content:center;
      padding-top:4px;
      margin:0;
      font-size:min(var(--title-size), 8vw);
      transform:translateY(var(--title-y));
      text-shadow:0 1px 0 rgba(255,255,255,.18);
    }

    .cat-visual{
      flex:1 1 auto;
      width:100%;
      min-height:0;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      padding:0;
    }

    .cat-visual img{
      width:auto;
      height:auto;
      max-width:82%;
      max-height:var(--img-h);
      object-fit:contain;
      display:block;
      pointer-events:none;
      user-select:none;
      transform-origin:center center;
      transform:translateY(var(--img-y)) scale(var(--img-scale));
    }

    .cat[data-key="hkm"]{
      --card-h: var(--hkm-card-h-p);
      --img-h: var(--hkm-img-h-p);
      --title-h: var(--hkm-title-h-p);
      --title-size: var(--hkm-title-size-p);
      --title-y: var(--hkm-title-y-p);
      --img-scale: var(--hkm-scale);
      --img-y: var(--hkm-y);
    }

    .cat[data-key="ram"]{
      --card-h: var(--ram-card-h-p);
      --img-h: var(--ram-img-h-p);
      --title-h: var(--ram-title-h-p);
      --title-size: var(--ram-title-size-p);
      --title-y: var(--ram-title-y-p);
      --img-scale: var(--ram-scale);
      --img-y: var(--ram-y);
    }

    .cat[data-key="job"]{
      --card-h: var(--job-card-h-p);
      --img-h: var(--job-img-h-p);
      --title-h: var(--job-title-h-p);
      --title-size: var(--job-title-size-p);
      --title-y: var(--job-title-y-p);
      --img-scale: var(--job-scale);
      --img-y: var(--job-y);
    }

    .cat[data-key="kit"]{
      --card-h: var(--kit-card-h-p);
      --img-h: var(--kit-img-h-p);
      --title-h: var(--kit-title-h-p);
      --title-size: var(--kit-title-size-p);
      --title-y: var(--kit-title-y-p);
      --img-scale: var(--kit-scale);
      --img-y: var(--kit-y);
    }

    .cat[data-key="song"]{
      --card-h: var(--song-card-h-p);
      --img-h: var(--song-img-h-p);
      --title-h: var(--song-title-h-p);
      --title-size: var(--song-title-size-p);
      --title-y: var(--song-title-y-p);
      --img-scale: var(--song-scale);
      --img-y: var(--song-y);
    }

    .cat[data-key="place"]{
      --card-h: var(--place-card-h-p);
      --img-h: var(--place-img-h-p);
      --title-h: var(--place-title-h-p);
      --title-size: var(--place-title-size-p);
      --title-y: var(--place-title-y-p);
      --img-scale: var(--place-scale);
      --img-y: var(--place-y);
    }

    .home-btn{
      position:fixed;
      left:var(--home-left-p);
      bottom:calc(var(--home-bottom-p) + var(--safe-bottom));
      width:var(--home-size-p);
      height:var(--home-size-p);
      border-radius:50%;
      border:6px solid #000;
      background:linear-gradient(180deg, var(--blue) 0%, var(--blue-2) 100%);
      box-shadow:0 8px 0 rgba(0,0,0,.28);
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      z-index:40;
      transition:transform .12s ease;
      transform:translate(var(--home-x-p), var(--home-y-p));
    }

    .home-btn:active{
      transform:translate(var(--home-x-p), calc(var(--home-y-p) + 2px)) scale(.99);
    }

    .home-btn svg{
      width:var(--home-icon-size-p);
      height:var(--home-icon-size-p);
      fill:#111;
    }

    .start-btn{
      position:fixed;
      left:50%;
      bottom:calc(var(--start-bottom-p) + var(--safe-bottom));
      transform:translate(calc(-50% + var(--start-x-p)), var(--start-y-p));
      border:none;
      width:min(var(--start-width-p), calc(100vw - 130px));
      max-width:100%;
      height:var(--start-height-p);
      border-radius:28px;
      border:6px solid #000;
      background:linear-gradient(180deg, var(--gold) 0%, var(--gold-dark) 100%);
      color:#fff;
      font-size:var(--start-font-p);
      font-weight:700;
      box-shadow:0 8px 0 rgba(0,0,0,.28);
      cursor:pointer;
      z-index:40;
      transition:transform .12s ease, opacity .12s ease, filter .12s ease;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:0 18px;
      text-shadow:0 3px 0 rgba(0,0,0,.16);
    }

    .start-btn:active{
      transform:translate(calc(-50% + var(--start-x-p)), calc(var(--start-y-p) + 2px)) scale(.99);
    }

    .start-btn[disabled]{
      opacity:.55;
      filter:grayscale(.12);
      cursor:not-allowed;
    }

    @keyframes patternDiagonal{
      from{ background-position:0 0; }
      to{ background-position:92px -92px; }
    }

    @keyframes floaty{
      0%,100%{ transform:translateY(0); }
      50%{ transform:translateY(-10px); }
    }

    @media (max-width:760px){
      .page{
        padding:12px 12px calc(var(--footer-space-p) + var(--safe-bottom));
      }

      .shell{
        gap:14px;
        padding-top:14px;
      }

      .top-strip{
        padding:14px 12px;
        border-radius:28px;
        gap:10px;
      }

      .strip-title{
        min-width:106px;
      }

      .strip-title-text{
        font-size:clamp(26px, 6vw, 42px);
      }

      .strip-scores{
        gap:8px;
      }

      .score-chip{
        min-width:126px;
        min-height:52px;
        padding:6px 10px;
      }

      .score-chip-name{
        font-size:18px;
        transform:translateY(-1px);
      }

      .score-chip-num{
        width:34px;
        height:34px;
        font-size:18px;
      }

      .strip-logo{
        min-width:76px;
      }

      .strip-logo img{
        width:min(110px, 24vw);
      }

      .board{
        padding:14px 12px;
        gap:14px;
        border-radius:28px;
      }

      .cat{
        border-radius:24px;
        border-width:5px;
      }

      .cat-visual img{
        max-width:84%;
      }
    }

    @media (orientation:landscape){
      .page{
        min-height:100dvh;
        padding:10px 14px calc(var(--footer-space-l) + var(--safe-bottom));
      }

      .shell{
        width:min(100%, 1800px);
        padding-top:16px;
        gap:12px;
      }

      .top-strip{
        width:min(100%, 1780px);
        min-height:88px;
        padding:10px 16px;
        border-radius:30px;
      }

      .strip-title{
        min-width:120px;
      }

      .strip-title-text{
        font-size:34px;
      }

      .strip-logo img{
        width:104px;
      }

      .score-chip{
        min-width:132px;
        max-width:220px;
        min-height:48px;
        border-width:3px;
        box-shadow:0 5px 0 rgba(0,0,0,.16);
      }

      .score-chip-name{
        font-size:18px;
        transform:translateY(-1px);
      }

      .score-chip-num{
        width:32px;
        height:32px;
        font-size:16px;
      }

      .board{
        width:min(100%, var(--board-width-l));
        grid-template-columns:repeat(3, minmax(0, 1fr));
        gap:var(--board-gap-l);
        padding:var(--board-pad-l);
        border-radius:var(--board-radius-l);
      }

      .cat[data-key="hkm"]{
        --card-h: var(--hkm-card-h-l);
        --img-h: var(--hkm-img-h-l);
        --title-h: var(--hkm-title-h-l);
        --title-size: var(--hkm-title-size-l);
        --title-y: var(--hkm-title-y-l);
      }

      .cat[data-key="ram"]{
        --card-h: var(--ram-card-h-l);
        --img-h: var(--ram-img-h-l);
        --title-h: var(--ram-title-h-l);
        --title-size: var(--ram-title-size-l);
        --title-y: var(--ram-title-y-l);
      }

      .cat[data-key="job"]{
        --card-h: var(--job-card-h-l);
        --img-h: var(--job-img-h-l);
        --title-h: var(--job-title-h-l);
        --title-size: var(--job-title-size-l);
        --title-y: var(--job-title-y-l);
      }

      .cat[data-key="kit"]{
        --card-h: var(--kit-card-h-l);
        --img-h: var(--kit-img-h-l);
        --title-h: var(--kit-title-h-l);
        --title-size: var(--kit-title-size-l);
        --title-y: var(--kit-title-y-l);
      }

      .cat[data-key="song"]{
        --card-h: var(--song-card-h-l);
        --img-h: var(--song-img-h-l);
        --title-h: var(--song-title-h-l);
        --title-size: var(--song-title-size-l);
        --title-y: var(--song-title-y-l);
      }

      .cat[data-key="place"]{
        --card-h: var(--place-card-h-l);
        --img-h: var(--place-img-h-l);
        --title-h: var(--place-title-h-l);
        --title-size: var(--place-title-size-l);
        --title-y: var(--place-title-y-l);
      }

      .cat{
        border-width:4px;
        border-radius:20px;
        box-shadow:0 5px 0 rgba(0,0,0,.24);
        padding:6px 8px 5px;
      }

      .cat-visual img{
        max-width:78%;
      }

      .home-btn{
        left:var(--home-left-l);
        bottom:calc(var(--home-bottom-l) + var(--safe-bottom));
        width:var(--home-size-l);
        height:var(--home-size-l);
        border-width:4px;
        box-shadow:0 5px 0 rgba(0,0,0,.24);
        transform:translate(var(--home-x-l), var(--home-y-l));
      }

      .home-btn:active{
        transform:translate(var(--home-x-l), calc(var(--home-y-l) + 2px)) scale(.99);
      }

      .home-btn svg{
        width:var(--home-icon-size-l);
        height:var(--home-icon-size-l);
      }

      .start-btn{
        bottom:calc(var(--start-bottom-l) + var(--safe-bottom));
        width:min(var(--start-width-l), calc(100vw - 170px));
        height:var(--start-height-l);
        font-size:var(--start-font-l);
        border-width:4px;
        box-shadow:0 5px 0 rgba(0,0,0,.24);
        transform:translate(calc(-50% + var(--start-x-l)), var(--start-y-l));
      }

      .start-btn:active{
        transform:translate(calc(-50% + var(--start-x-l)), calc(var(--start-y-l) + 2px)) scale(.99);
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="floaters" aria-hidden="true">
      <span class="floater f1"></span>
      <span class="floater f2"></span>
      <span class="floater f3"></span>
      <span class="floater f4"></span>
    </div>

    <main class="shell">
      <section class="top-strip" aria-label="معلومات اللعبة">
        <div class="strip-title" aria-hidden="true">
          <div class="strip-title-text">
            <span class="word-top">بدون</span>
            <span class="word-bottom">كلام</span>
          </div>
        </div>

        <div class="strip-scores" aria-label="نتائج الفريقين">
          <div class="score-chip">
            <div class="score-chip-name" id="team1Name">الفريق الأول</div>
            <div class="score-chip-num"><span id="team1Score">0</span></div>
          </div>

          <div class="score-chip">
            <div class="score-chip-name" id="team2Name">الفريق الثاني</div>
            <div class="score-chip-num"><span id="team2Score">0</span></div>
          </div>
        </div>

        <div class="strip-logo" aria-label="صندوق المسابقات">
          <img src="logo.PNG" alt="صندوق المسابقات">
        </div>
      </section>

      <section class="board" aria-label="الكتاغوريات">
        <button class="cat" type="button" data-key="hkm" data-name="حكم وأمثال">
          <div class="cat-title">حكم وأمثال</div>
          <div class="cat-visual"><img src="hkm.PNG" alt="حكم وأمثال"></div>
        </button>

        <button class="cat" type="button" data-key="ram" data-name="مسلسلات رمضانية">
          <div class="cat-title">مسلسلات رمضانية</div>
          <div class="cat-visual"><img src="ram.PNG" alt="مسلسلات رمضانية"></div>
        </button>

        <button class="cat" type="button" data-key="job" data-name="وظائف ومهن">
          <div class="cat-title">وظائف ومهن</div>
          <div class="cat-visual"><img src="job.PNG" alt="وظائف ومهن"></div>
        </button>

        <button class="cat" type="button" data-key="kit" data-name="أدوات المطبخ">
          <div class="cat-title">أدوات المطبخ</div>
          <div class="cat-visual"><img src="kit.PNG" alt="أدوات المطبخ"></div>
        </button>

        <button class="cat" type="button" data-key="song" data-name="أغاني">
          <div class="cat-title">أغاني</div>
          <div class="cat-visual"><img src="song.PNG" alt="أغاني"></div>
        </button>

        <button class="cat" type="button" data-key="place" data-name="أماكن ومواقع">
          <div class="cat-title">أماكن ومواقع</div>
          <div class="cat-visual"><img src="place.PNG" alt="أماكن ومواقع"></div>
        </button>
      </section>
    </main>

    <button class="home-btn" id="homeBtn" type="button" aria-label="الرئيسية" title="الرئيسية">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 3.2 3.2 10.5a1 1 0 0 0 .64 1.77h1.41v7.05A1.68 1.68 0 0 0 6.93 21h3.74a1 1 0 0 0 1-1v-4.1h.66V20a1 1 0 0 0 1 1h3.74a1.68 1.68 0 0 0 1.68-1.68v-7.05h1.41a1 1 0 0 0 .64-1.77L12 3.2z"/>
      </svg>
    </button>

    <button class="start-btn" id="startBtn" type="button" disabled>التالي</button>
  </div>

  <script>
    const cards = Array.from(document.querySelectorAll(".cat"));
    const startBtn = document.getElementById("startBtn");
    const homeBtn = document.getElementById("homeBtn");

    const team1NameEl = document.getElementById("team1Name");
    const team2NameEl = document.getElementById("team2Name");
    const team1ScoreEl = document.getElementById("team1Score");
    const team2ScoreEl = document.getElementById("team2Score");

    const savedKey = sessionStorage.getItem("bdonKalam_categoryKey") || "";
    let selectedKey = savedKey;

    function loadHeaderData() {
      const team1 = sessionStorage.getItem("bdonKalam_team1") || "الفريق الأول";
      const team2 = sessionStorage.getItem("bdonKalam_team2") || "الفريق الثاني";
      const score1 = sessionStorage.getItem("bdonKalam_score1") || "0";
      const score2 = sessionStorage.getItem("bdonKalam_score2") || "0";

      team1NameEl.textContent = team1;
      team2NameEl.textContent = team2;
      team1ScoreEl.textContent = score1;
      team2ScoreEl.textContent = score2;
    }

    function applySelection(key) {
      selectedKey = key || "";
      cards.forEach(card => {
        card.classList.toggle("selected", card.dataset.key === selectedKey);
      });
      startBtn.disabled = !selectedKey;
    }

    cards.forEach(card => {
      card.addEventListener("click", () => {
        const key = card.dataset.key;
        const name = card.dataset.name;

        sessionStorage.setItem("bdonKalam_categoryKey", key);
        sessionStorage.setItem("bdonKalam_categoryName", name);
        sessionStorage.removeItem("bdonKalam_selectedNumber");

        applySelection(key);
      });
    });

    startBtn.addEventListener("click", () => {
      if (!selectedKey) return;
      window.location.href = "numbers.html";
    });

    homeBtn.addEventListener("click", () => {
      window.location.href = "index.html";
    });

    loadHeaderData();
    applySelection(savedKey);
  </script>
</body>
</html>
