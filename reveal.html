<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>بدون كلام - عرض الصورة</title>

  <style>
    @font-face{
      font-family:"Estedad";
      src:url("Estedad-Bold.ttf") format("truetype");
      font-style:normal;
      font-weight:700;
      font-display:swap;
    }

    :root{
      --bg:#f7efd8;
      --dot:#e7d8ae;
      --ink:#18131d;
      --panel:#f8efd6;
      --panel-2:#f0e0b9;
      --card:#fffdf8;
      --gold:#f2b84a;
      --gold-dark:#d9981e;
      --shadow:0 14px 0 rgba(0,0,0,.20);
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
      font-family:"Estedad",Tahoma,Arial,"Segoe UI",sans-serif;
    }

    html,body{
      margin:0;
      min-height:100%;
      background:var(--bg);
      color:var(--ink);
    }

    body{
      min-height:100vh;
      overflow-x:hidden;
    }

    .page{
      position:relative;
      min-height:100dvh;
      padding:16px;
      background:
        radial-gradient(circle at 18% 18%, rgba(255,255,255,.34), transparent 18%),
        radial-gradient(circle at 83% 16%, rgba(255,255,255,.22), transparent 18%),
        radial-gradient(circle at 62% 82%, rgba(255,255,255,.16), transparent 20%),
        linear-gradient(180deg, var(--bg), #f9f1dc 100%);
      overflow:hidden;
    }

    .page::before{
      content:"";
      position:absolute;
      inset:-180px;
      background-image:radial-gradient(var(--dot) 34%, transparent 36%);
      background-size:36px 36px;
      opacity:.68;
      pointer-events:none;
      z-index:0;
    }

    .shell{
      width:min(100%, 900px);
      margin:0 auto;
      position:relative;
      z-index:1;
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .topbar{
      background:linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
      border:4px solid #000;
      border-radius:34px;
      box-shadow:var(--shadow);
      padding:12px 16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .brand img{
      width:60px;
      height:auto;
      display:block;
    }

    .game-logo{
      display:inline-flex;
      flex-direction:column;
      align-items:center;
      line-height:.84;
      color:#11101a;
      letter-spacing:-.5px;
      transform:rotate(-6deg);
      text-shadow:
        -4px -4px 0 #fff,
         4px -4px 0 #fff,
        -4px  4px 0 #fff,
         4px  4px 0 #fff,
         0   -4px 0 #fff,
         0    4px 0 #fff,
        -4px  0   0 #fff,
         4px  0   0 #fff,
         0    7px 0 rgba(0,0,0,.05);
      filter:drop-shadow(0 6px 0 rgba(0,0,0,.04));
      user-select:none;
      pointer-events:none;
      font-size:clamp(30px, 5vw, 42px);
    }

    .game-logo .word-top{ transform:translateY(-5px); }
    .game-logo .word-bottom{ transform:translateY(2px); }

    .meta{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-start;
    }

    .pill{
      min-height:48px;
      padding:0 18px;
      border-radius:999px;
      border:3px solid #000;
      background:linear-gradient(180deg, var(--gold) 0%, var(--gold-dark) 100%);
      box-shadow:0 6px 0 rgba(0,0,0,.16);
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      color:#fffdf7;
      font-size:22px;
      line-height:1;
      text-shadow:0 2px 0 rgba(0,0,0,.14);
      white-space:nowrap;
    }

    .stage{
      background:linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
      border:4px solid #000;
      border-radius:34px;
      box-shadow:var(--shadow);
      padding:18px;
    }

    .title{
      margin:0 0 14px;
      text-align:center;
      font-size:clamp(24px, 4.8vw, 42px);
      line-height:1.3;
    }

    .subtitle{
      margin:0 0 18px;
      text-align:center;
      color:#3d3326;
      font-size:clamp(16px, 3.2vw, 24px);
      line-height:1.4;
    }

    .image-card{
      width:min(100%, 760px);
      margin:0 auto;
      background:var(--card);
      border:4px solid #000;
      border-radius:30px;
      box-shadow:0 10px 24px rgba(0,0,0,.12);
      padding:14px;
    }

    .image-frame{
      width:100%;
      min-height:320px;
      border-radius:22px;
      overflow:hidden;
      background:#f1ead3;
      display:flex;
      align-items:center;
      justify-content:center;
      border:3px solid #000;
    }

    .image-frame img{
      width:100%;
      height:auto;
      display:block;
      object-fit:contain;
      max-height:75vh;
      background:#fff;
    }

    .hint{
      margin:14px 0 0;
      text-align:center;
      color:#5a4d3a;
      font-size:clamp(15px, 2.8vw, 22px);
      line-height:1.5;
    }

    .error-box{
      width:min(100%, 760px);
      margin:0 auto;
      background:#fff7f2;
      border:4px solid #000;
      border-radius:30px;
      box-shadow:0 10px 24px rgba(0,0,0,.10);
      padding:22px 18px;
      text-align:center;
      display:none;
    }

    .error-box.show{
      display:block;
    }

    .error-title{
      margin:0 0 10px;
      font-size:clamp(24px, 4.5vw, 38px);
    }

    .error-text{
      margin:0;
      font-size:clamp(16px, 3vw, 24px);
      line-height:1.6;
      color:#5a4d3a;
    }

    @media (max-width:700px){
      .page{
        padding:12px;
      }

      .topbar{
        padding:10px 12px;
        border-radius:28px;
      }

      .brand img{
        width:48px;
      }

      .pill{
        min-height:42px;
        font-size:18px;
        padding:0 14px;
      }

      .stage{
        padding:14px;
        border-radius:28px;
      }

      .image-card{
        padding:10px;
        border-radius:24px;
      }

      .image-frame{
        min-height:220px;
        border-radius:18px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <main class="shell">
      <section class="topbar">
        <div class="brand">
          <div class="game-logo" aria-hidden="true">
            <span class="word-top">بدون</span>
            <span class="word-bottom">كلام</span>
          </div>
          <img src="logo.PNG" alt="صندوق المسابقات">
        </div>

        <div class="meta">
          <div class="pill" id="categoryBadge">القسم</div>
          <div class="pill" id="numberBadge">رقم 1</div>
        </div>
      </section>

      <section class="stage">
        <h1 class="title">شوف الصورة وابدأ الشرح بالإشارات فقط</h1>
        <p class="subtitle">لا تُظهر الشاشة لفريقك</p>

        <div id="imageCard" class="image-card" style="display:none;">
          <div class="image-frame">
            <img id="revealImage" alt="صورة السؤال">
          </div>
          <p class="hint">الصورة ظهرت لك بنجاح</p>
        </div>

        <div id="errorBox" class="error-box">
          <h2 class="error-title">الصورة غير موجودة</h2>
          <p class="error-text" id="errorText">تأكد من القسم والرقم أو من اسم ملف الصورة داخل المستودع.</p>
        </div>
      </section>
    </main>
  </div>

  <script>
    const CATEGORY_NAMES = {
      hkm: "حكم وأمثال",
      ram: "مسلسلات رمضانية",
      job: "وظائف ومهن",
      kit: "أدوات المطبخ",
      song: "أغاني",
      place: "أماكن ومواقع"
    };

    const params = new URLSearchParams(window.location.search);
    const cat = String(params.get("cat") || "hkm").trim();
    const num = String(params.get("num") || "1").trim();
    const catNameFromUrl = String(params.get("catName") || "").trim();

    const categoryBadge = document.getElementById("categoryBadge");
    const numberBadge = document.getElementById("numberBadge");
    const revealImage = document.getElementById("revealImage");
    const imageCard = document.getElementById("imageCard");
    const errorBox = document.getElementById("errorBox");
    const errorText = document.getElementById("errorText");

    const shownCategoryName = catNameFromUrl || CATEGORY_NAMES[cat] || cat;

    categoryBadge.textContent = shownCategoryName;
    numberBadge.textContent = `رقم ${num}`;

    const candidates = [
      `images/${cat}/${num}.PNG`,
      `images/${cat}/${num}.png`,
      `images/${cat}/${num}.JPG`,
      `images/${cat}/${num}.jpg`,
      `images/${cat}/${num}.JPEG`,
      `images/${cat}/${num}.jpeg`,
      `images/${cat}/${num}.WEBP`,
      `images/${cat}/${num}.webp`
    ];

    let currentIndex = 0;

    function showError() {
      imageCard.style.display = "none";
      errorBox.classList.add("show");
      errorText.textContent = `ما حصلت صورة لهذا العنصر: ${cat} / ${num}`;
    }

    revealImage.addEventListener("load", () => {
      errorBox.classList.remove("show");
      imageCard.style.display = "block";
    });

    revealImage.addEventListener("error", () => {
      currentIndex += 1;
      if (currentIndex >= candidates.length) {
        showError();
        return;
      }
      revealImage.src = candidates[currentIndex];
    });

    revealImage.src = candidates[currentIndex];
  </script>
</body>
</html>
