<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>عرض الصورة</title>

  <style>
    html,body{
      margin:0;
      width:100%;
      min-height:100%;
      background:#000;
    }

    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }

    #revealImage{
      width:100vw;
      height:100vh;
      object-fit:contain;
      display:block;
      background:#000;
    }

    #errorBox{
      display:none;
      color:#fff;
      font:700 20px Tahoma, Arial, sans-serif;
      text-align:center;
      padding:24px;
      line-height:1.8;
    }

    #errorBox.show{
      display:block;
    }
  </style>
</head>
<body>
  <img id="revealImage" alt="صورة السؤال">
  <div id="errorBox">الصورة غير موجودة</div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const cat = String(params.get("cat") || "hkm").trim();
    const num = String(params.get("num") || "1").trim();

    const revealImage = document.getElementById("revealImage");
    const errorBox = document.getElementById("errorBox");

    const candidates = [
      `images/${cat}/${num}.PNG`,
      `images/${cat}/${num}.png`,
      `images/${cat}/${num}.JPG`,
      `images/${cat}/${num}.jpg`,
      `images/${cat}/${num}.JPEG`,
      `images/${cat}/${num}.jpeg`,
      `images/${cat}/${num}.WEBP`,
      `images/${cat}/${num}.webp`
    ];

    let currentIndex = 0;

    function showError() {
      revealImage.style.display = "none";
      errorBox.classList.add("show");
    }

    revealImage.addEventListener("load", () => {
      errorBox.classList.remove("show");
      revealImage.style.display = "block";
    });

    revealImage.addEventListener("error", () => {
      currentIndex += 1;
      if (currentIndex >= candidates.length) {
        showError();
        return;
      }
      revealImage.src = candidates[currentIndex];
    });

    revealImage.src = candidates[currentIndex];
  </script>
</body>
</html>
