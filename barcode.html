<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>لعبة بدون كلام - الباركود</title>

  <style>
    @font-face{
      font-family:"Estedad";
      src:url("Estedad-Bold.ttf") format("truetype");
      font-style:normal;
      font-weight:700;
      font-display:swap;
    }

    :root{
      --bg:#f7efd8;
      --dot:#e7d8ae;
      --ink:#18131d;
      --white:#fffdf7;
      --panel:#f8efd6;
      --panel-2:#f0e0b9;
      --gold:#f2b84a;
      --gold-dark:#d9981e;
      --green:#0b6a39;
      --poster:#dde4cb;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --footer-space-p: 98px;
      --footer-space-l: 28px;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
      font-family:"Estedad", Tahoma, Arial, "Segoe UI", sans-serif;
    }

    html,body{
      margin:0;
      min-height:100%;
      background:var(--bg);
      color:var(--ink);
    }

    body{
      min-height:100vh;
      overflow-x:hidden;
    }

    .page{
      position:relative;
      min-height:100dvh;
      overflow-x:hidden;
      overflow-y:auto;
      padding:14px 14px calc(var(--footer-space-p) + var(--safe-bottom));
      background:
        radial-gradient(circle at 18% 18%, rgba(255,255,255,.34), transparent 18%),
        radial-gradient(circle at 83% 16%, rgba(255,255,255,.22), transparent 18%),
        radial-gradient(circle at 62% 82%, rgba(255,255,255,.16), transparent 20%),
        linear-gradient(180deg, var(--bg), #f9f1dc 100%);
    }

    .page::before{
      content:"";
      position:absolute;
      inset:-180px;
      background-image:radial-gradient(var(--dot) 34%, transparent 36%);
      background-size:36px 36px;
      opacity:.68;
      pointer-events:none;
      z-index:0;
    }

    .shell{
      width:min(100%, 980px);
      margin:0 auto;
      display:flex;
      flex-direction:column;
      gap:14px;
      padding-top:18px;
      position:relative;
      z-index:2;
    }

    .portrait-only{ display:block; }
    .landscape-only{ display:none !important; }

    .ltr{
      direction:ltr;
      unicode-bidi:isolate;
      display:inline-block;
    }

    .game-logo{
      display:inline-flex;
      flex-direction:column;
      align-items:center;
      line-height:.84;
      color:#11101a;
      letter-spacing:-.5px;
      transform:rotate(-6deg);
      text-shadow:
        -4px -4px 0 #fff,
         4px -4px 0 #fff,
        -4px  4px 0 #fff,
         4px  4px 0 #fff,
         0   -4px 0 #fff,
         0    4px 0 #fff,
        -4px  0   0 #fff,
         4px  0   0 #fff,
         0    7px 0 rgba(0,0,0,.05);
      filter:drop-shadow(0 6px 0 rgba(0,0,0,.04));
      user-select:none;
      pointer-events:none;
    }

    .game-logo .word-top{ transform:translateY(-6px); }
    .game-logo .word-bottom{ transform:translateY(2px); }

    .topbar{
      width:min(100%, 960px);
      min-height:108px;
      background:linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
      border:4px solid #000;
      border-radius:34px;
      box-shadow:0 10px 0 rgba(0,0,0,.28);
      overflow:hidden;
      padding:14px 18px;
    }

    .portrait-bar{
      min-height:76px;
      display:grid;
      grid-template-columns:118px 1fr 118px;
      align-items:center;
      gap:12px;
    }

    .portrait-logo{
      display:flex;
      align-items:center;
      justify-content:flex-start;
      filter:drop-shadow(0 4px 0 rgba(255,255,255,.38));
    }

    .portrait-logo img{
      width:min(130px, 26vw);
      height:auto;
      display:block;
    }

    .portrait-title{
      display:flex;
      justify-content:flex-end;
      align-items:center;
    }

    .portrait-title .game-logo{
      font-size:clamp(32px, 5.6vw, 52px);
    }

    .strip-scores{
      width:min(100%, 430px);
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:10px;
      align-items:center;
      direction:ltr;
      justify-self:center;
    }

    .score-chip{
      min-width:0;
      width:100%;
      min-height:58px;
      padding:8px 10px;
      border-radius:22px;
      border:3px solid #000;
      background:linear-gradient(180deg, #fffdf8 0%, #f4ecd0 100%);
      box-shadow:0 6px 0 rgba(0,0,0,.18);
      display:flex;
      align-items:center;
      gap:8px;
      justify-content:space-between;
      direction:ltr;
    }

    .score-chip-name{
      flex:1 1 auto;
      min-width:0;
      color:#173e73;
      font-size:20px;
      line-height:1.15;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      text-align:right;
      display:flex;
      align-items:center;
      justify-content:flex-end;
      min-height:100%;
      transform:translateY(-1px);
    }

    .score-chip-num{
      width:38px;
      height:38px;
      border-radius:14px;
      border:3px solid #000;
      background:var(--gold);
      box-shadow:0 4px 0 rgba(0,0,0,.16);
      color:#3f2b0c;
      display:flex;
      align-items:center;
      justify-content:center;
      flex:0 0 auto;
      padding:0;
      direction:ltr;
      text-align:center;
      line-height:1;
      font-weight:700;
      font-variant-numeric:tabular-nums;
      order:-1;
    }

    .controls-row{
      width:min(100%, 960px);
      display:flex;
      justify-content:flex-start;
      direction:ltr;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }

    .timer-cluster{
      position:relative;
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .timer-dock{
      min-width:230px;
      height:72px;
      padding:0 12px;
      border-radius:999px;
      border:4px solid #000;
      background:linear-gradient(180deg, #f8f3df 0%, #efe6c8 100%);
      box-shadow:0 8px 0 rgba(0,0,0,.22);
      display:flex;
      align-items:center;
      gap:10px;
    }

    .timer-control{
      width:44px;
      height:44px;
      border:none;
      border-radius:50%;
      border:3px solid var(--green);
      background:#f9f5e8;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      padding:0;
      flex:0 0 auto;
    }

    .timer-control svg{
      width:22px;
      height:22px;
      stroke:var(--green);
      fill:none;
      stroke-width:2.4;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    .timer-control.playing .play-icon{ display:none; }
    .timer-control.playing .pause-icon{ display:block; }
    .timer-control:not(.playing) .play-icon{ display:block; }
    .timer-control:not(.playing) .pause-icon{ display:none; }

    .timer-value{
      min-width:90px;
      text-align:center;
      color:var(--green);
      font-size:34px;
      line-height:1;
      font-variant-numeric:tabular-nums;
      letter-spacing:.4px;
      white-space:nowrap;
    }

    .duration-btn,
    .back-btn{
      height:60px;
      padding:0 18px;
      border:none;
      border-radius:999px;
      border:4px solid #000;
      box-shadow:0 8px 0 rgba(0,0,0,.22);
      cursor:pointer;
      font-size:24px;
      line-height:1;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(180deg, #fffdf8 0%, #efe4c7 100%);
      color:#111;
      white-space:nowrap;
    }

    .duration-btn{
      min-width:136px;
      background:linear-gradient(180deg, var(--gold) 0%, var(--gold-dark) 100%);
      color:#fffdf7;
      text-shadow:0 2px 0 rgba(0,0,0,.16);
    }

    .duration-menu{
      position:absolute;
      top:84px;
      left:0;
      display:none;
      gap:8px;
      flex-wrap:wrap;
      width:min(420px, 92vw);
      padding:12px;
      border-radius:24px;
      border:4px solid #000;
      background:linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
      box-shadow:0 10px 0 rgba(0,0,0,.22);
      z-index:20;
    }

    .duration-menu.show{ display:flex; }

    .duration-option{
      min-width:88px;
      height:50px;
      border:none;
      border-radius:16px;
      border:3px solid #000;
      background:#fff8e9;
      color:#17426a;
      box-shadow:0 4px 0 rgba(0,0,0,.18);
      cursor:pointer;
      font-size:21px;
      line-height:1;
    }

    .duration-option.active{
      background:linear-gradient(180deg, var(--gold) 0%, var(--gold-dark) 100%);
      color:#fffdf7;
    }

    .content-layout{
      display:block;
    }

    .land-sidebar{
      display:none;
    }

    .stage{
      width:min(100%, 960px);
      background:linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
      border:4px solid #000;
      border-radius:34px;
      box-shadow:0 10px 0 rgba(0,0,0,.28);
      padding:18px 18px 16px;
    }

    .barcode-title{
      margin:0 0 14px;
      text-align:center;
      color:#111;
      font-size:clamp(24px, 4.5vw, 42px);
      line-height:1.45;
    }

    .poster-trigger{
      display:flex;
      justify-content:center;
      background:none;
      border:none;
      width:100%;
      cursor:pointer;
      padding:0;
    }

    .poster-card{
      width:min(100%, 420px);
      height:560px;
      background:var(--poster);
      border-radius:28px;
      border:3px solid #000;
      box-shadow:0 10px 22px rgba(0,0,0,.12);
      position:relative;
      overflow:hidden;
    }

    .poster-title{
      position:absolute;
      top:26px;
      right:28px;
      left:28px;
      margin:0;
      text-align:center;
      color:#111;
      font-size:clamp(22px, 4vw, 36px);
      line-height:1.2;
    }

    .poster-list{
      position:absolute;
      top:112px;
      right:34px;
      left:34px;
      margin:0;
      padding:0;
      list-style:none;
      color:#111;
      font-size:clamp(13px, 2.4vw, 20px);
      line-height:1.75;
      text-align:right;
    }

    .poster-list li{ margin:2px 0; }

    .poster-qr-wrap{
      position:absolute;
      left:22px;
      bottom:28px;
      text-align:center;
    }

    .poster-qr{
      width:88px;
      height:88px;
      background:#fff;
      border-radius:8px;
      display:block;
      object-fit:cover;
      padding:4px;
      margin:0 auto 8px;
    }

    .poster-qr-text{
      color:#111;
      font-size:16px;
      line-height:1.2;
    }

    .poster-boy{
      position:absolute;
      right:22px;
      bottom:0;
      width:120px;
      height:auto;
      object-fit:contain;
      display:block;
    }

    .poster-game-logo{
      position:absolute;
      left:50%;
      bottom:28px;
      transform:translateX(-50%) rotate(-4deg);
      display:inline-flex;
      flex-direction:column;
      align-items:center;
      line-height:.84;
      color:#111;
      font-size:34px;
      letter-spacing:-.5px;
      text-shadow:
        -4px -4px 0 #fff,
         4px -4px 0 #fff,
        -4px  4px 0 #fff,
         4px  4px 0 #fff,
         0   -4px 0 #fff,
         0    4px 0 #fff,
        -4px  0   0 #fff,
         4px  0   0 #fff,
         0    6px 0 rgba(0,0,0,.06);
      user-select:none;
      pointer-events:none;
    }

    .poster-game-logo .word-top{ transform:translateY(-3px); }
    .poster-game-logo .word-bottom{ transform:translateY(2px); }

    .overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.58);
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      z-index:90;
    }

    .overlay.show{ display:flex; }

    .qr-only{
      width:min(80vw, 440px);
      height:auto;
      background:#fff;
      border-radius:22px;
      padding:14px;
      box-shadow:0 18px 34px rgba(0,0,0,.28);
      display:block;
    }

    .answer-card{
      width:min(100%, 980px);
      min-height:min(72vh, 620px);
      background:#ececec;
      border-radius:34px;
      border:6px solid #000;
      box-shadow:0 16px 28px rgba(0,0,0,.22);
      overflow:hidden;
      position:relative;
    }

    .answer-top{
      height:24px;
      background:linear-gradient(180deg, var(--gold) 0%, var(--gold-dark) 100%);
    }

    .answer-content{
      padding:28px 22px 110px;
      text-align:center;
    }

    .answer-title{
      margin:0 0 28px;
      color:#111;
      font-size:clamp(34px, 6vw, 72px);
      line-height:1.15;
    }

    .answer-options{
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:22px;
      width:min(100%, 720px);
      margin:0 auto;
    }

    .answer-btn{
      min-height:86px;
      border:none;
      border-radius:999px;
      border:5px solid #000;
      background:linear-gradient(180deg, #f8f4e4 0%, #e7dfc2 100%);
      color:#111;
      box-shadow:0 8px 0 rgba(0,0,0,.18);
      cursor:pointer;
      font-size:clamp(28px, 4vw, 48px);
      line-height:1;
      padding:12px 18px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
    }

    .answer-btn.none{
      grid-column:1 / -1;
      width:min(100%, 280px);
      margin:0 auto;
    }

    .answer-back{
      position:absolute;
      right:18px;
      bottom:18px;
      min-width:220px;
      height:72px;
      border:none;
      border-radius:999px;
      border:5px solid #000;
      background:linear-gradient(180deg, #f8f4e4 0%, #e7dfc2 100%);
      color:#111;
      box-shadow:0 8px 0 rgba(0,0,0,.18);
      cursor:pointer;
      font-size:clamp(24px, 3vw, 40px);
      line-height:1;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:0 22px;
    }

    .bottom-bar{
      position:fixed;
      left:0;
      right:0;
      bottom:var(--safe-bottom);
      height:var(--footer-space-p);
      pointer-events:none;
      z-index:35;
    }

    .main-action{
      position:absolute;
      right:8px;
      bottom:8px;
      min-width:210px;
      height:72px;
      border:none;
      border-radius:24px;
      border:5px solid #000;
      background:linear-gradient(180deg, var(--gold) 0%, var(--gold-dark) 100%);
      color:#fff;
      font-size:clamp(30px, 4.7vw, 42px);
      font-weight:700;
      box-shadow:0 7px 0 rgba(0,0,0,.28);
      cursor:pointer;
      pointer-events:auto;
      text-shadow:0 3px 0 rgba(0,0,0,.16);
      padding:0 22px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      line-height:1;
    }

    .main-action.alt{
      background:linear-gradient(180deg, #202020 0%, #050505 100%);
    }

    @media (max-width:700px){
      .page{
        padding:12px 12px calc(var(--footer-space-p) + var(--safe-bottom));
      }

      .shell{
        gap:12px;
        padding-top:14px;
      }

      .topbar{
        min-height:98px;
        padding:12px 18px;
      }

      .portrait-bar{
        grid-template-columns:82px 1fr 82px;
        gap:8px;
      }

      .portrait-title .game-logo{
        font-size:clamp(22px, 5vw, 36px);
      }

      .strip-scores{
        width:min(100%, 280px);
        gap:8px;
      }

      .score-chip{
        min-height:52px;
        padding:6px 8px;
      }

      .score-chip-name{
        font-size:17px;
      }

      .score-chip-num{
        width:34px;
        height:34px;
        font-size:18px;
      }

      .portrait-logo img{
        width:min(82px, 20vw);
      }

      .timer-dock{
        min-width:210px;
        height:66px;
      }

      .timer-control{
        width:40px;
        height:40px;
      }

      .timer-value{
        font-size:30px;
      }

      .duration-btn,
      .back-btn{
        height:56px;
        min-width:122px;
        font-size:22px;
      }

      .stage{
        padding:16px 12px 16px;
        border-radius:28px;
      }

      .poster-card{
        width:min(100%, 360px);
        height:470px;
      }

      .poster-title{
        top:20px;
        right:22px;
        left:22px;
        font-size:clamp(18px, 4vw, 30px);
      }

      .poster-list{
        top:92px;
        right:22px;
        left:22px;
        font-size:clamp(12px, 2.9vw, 18px);
      }

      .poster-boy{
        width:102px;
        right:16px;
      }

      .poster-qr-wrap{
        left:16px;
        bottom:24px;
      }

      .poster-qr{
        width:78px;
        height:78px;
      }

      .poster-game-logo{
        bottom:24px;
        font-size:30px;
      }

      .answer-options{
        grid-template-columns:1fr;
      }

      .answer-btn.none{
        width:100%;
      }

      .answer-back{
        left:18px;
        right:18px;
        min-width:0;
        width:auto;
      }

      .main-action{
        right:6px;
        bottom:6px;
        min-width:195px;
      }
    }

    @media (orientation:landscape){
      .page{
        padding:8px 12px calc(var(--footer-space-l) + var(--safe-bottom));
      }

      .portrait-only{ display:none !important; }
      .landscape-only{ display:block !important; }

      .shell{
        width:min(100%, 100%);
        gap:10px;
        padding-top:8px;
      }

      .topbar{
        min-height:72px;
        padding:8px 12px;
      }

      .topbar-land{
        display:flex !important;
        align-items:center;
        gap:12px;
        width:100%;
        direction:ltr;
      }

      .land-back{
        order:1;
        display:flex;
        align-items:center;
      }

      .land-timer{
        order:2;
        display:flex;
        align-items:center;
      }

      .land-duration-wrap{
        order:3;
        position:relative;
        display:flex;
        align-items:center;
      }

      .land-game-logo{
        order:4;
        display:flex;
        align-items:center;
        margin-left:auto;
      }

      .land-store-logo{
        order:5;
        display:flex;
        align-items:center;
      }

      .land-store-logo img{
        width:74px;
        height:auto;
        display:block;
      }

      .land-game-logo .game-logo{
        font-size:26px;
      }

      .land-duration-wrap .duration-btn{
        min-width:96px;
        height:40px;
        border-width:3px;
        box-shadow:0 4px 0 rgba(0,0,0,.18);
        font-size:17px;
        padding:0 12px;
      }

      .land-duration-wrap .duration-menu{
        top:50px;
        left:0;
        right:auto;
        padding:10px;
        border-width:3px;
        box-shadow:0 8px 0 rgba(0,0,0,.20);
      }

      .land-duration-wrap .duration-option{
        height:38px;
        font-size:16px;
      }

      .land-timer .timer-dock{
        min-width:182px;
        height:40px;
        border-width:3px;
        box-shadow:0 4px 0 rgba(0,0,0,.18);
        padding:0 9px;
        gap:8px;
      }

      .land-timer .timer-control{
        width:24px;
        height:24px;
        border-width:2px;
      }

      .land-timer .timer-control svg{
        width:13px;
        height:13px;
      }

      .land-timer .timer-value{
        min-width:60px;
        font-size:19px;
      }

      .land-back .back-btn{
        min-width:82px;
        height:40px;
        border-width:3px;
        box-shadow:0 4px 0 rgba(0,0,0,.18);
        font-size:17px;
        padding:0 14px;
      }

      .content-layout{
        display:grid;
        grid-template-columns:250px minmax(0, 1fr);
        gap:12px;
        align-items:start;
        direction:ltr;
      }

      .land-sidebar{
        display:flex;
        flex-direction:column;
        gap:12px;
        direction:rtl;
      }

      .stage{
        width:100%;
        min-height:calc(100vh - 126px);
        padding:14px 16px 12px;
        border-radius:28px;
        display:flex;
        flex-direction:column;
        justify-content:center;
        direction:rtl;
      }

      .team-stack{
        display:flex;
        flex-direction:column;
        gap:10px;
      }

      .team-panel{
        width:100%;
        background:linear-gradient(180deg, #fffdf9 0%, #f7f0dc 100%);
        border:4px solid #000;
        border-radius:28px;
        box-shadow:0 8px 0 rgba(0,0,0,.20);
        padding:14px 14px 12px;
      }

      .team-panel-name{
        color:#173e73;
        text-align:center;
        font-size:28px;
        line-height:1.15;
        margin:0 0 12px;
        white-space:nowrap;
        overflow:hidden;
        text-overflow:ellipsis;
      }

      .team-panel-score{
        height:56px;
        border-radius:22px;
        border:4px solid #000;
        background:linear-gradient(180deg, var(--gold) 0%, var(--gold-dark) 100%);
        box-shadow:0 5px 0 rgba(0,0,0,.16);
        color:#fffdf7;
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:34px;
        line-height:1;
        text-shadow:0 2px 0 rgba(0,0,0,.14);
      }

      .land-action-wrap{
        display:flex;
        margin-top:24px;
      }

      .land-action-btn{
        width:100%;
        height:58px;
        border:none;
        border-radius:24px;
        border:4px solid #000;
        background:linear-gradient(180deg, var(--gold) 0%, var(--gold-dark) 100%);
        color:#fffdf7;
        box-shadow:0 6px 0 rgba(0,0,0,.22);
        font-size:28px;
        line-height:1;
        text-shadow:0 2px 0 rgba(0,0,0,.16);
        cursor:pointer;
      }

      .land-action-btn.alt{
        background:linear-gradient(180deg, #202020 0%, #050505 100%);
      }

      .barcode-title{
        margin-bottom:10px;
        font-size:clamp(20px, 2vw, 32px);
      }

      .poster-trigger{
        flex:1 1 auto;
        align-items:center;
        justify-content:center;
      }

      .poster-card{
        width:min(100%, 430px);
        height:260px;
        border-radius:22px;
      }

      .poster-title{
        top:12px;
        right:16px;
        left:16px;
        font-size:clamp(14px, 1.8vw, 24px);
      }

      .poster-list{
        top:56px;
        right:18px;
        left:18px;
        font-size:clamp(9px, .95vw, 13px);
        line-height:1.55;
      }

      .poster-qr-wrap{
        left:12px;
        bottom:10px;
      }

      .poster-qr{
        width:54px;
        height:54px;
        margin-bottom:4px;
      }

      .poster-qr-text{
        font-size:11px;
      }

      .poster-boy{
        width:82px;
        right:10px;
        bottom:0;
      }

      .poster-game-logo{
        bottom:14px;
        font-size:22px;
      }

      .bottom-bar{
        display:none;
      }

      .answer-card{
        min-height:min(70vh, 520px);
      }

      .answer-title{
        font-size:clamp(28px, 3.2vw, 58px);
      }

      .answer-btn{
        min-height:72px;
        font-size:clamp(22px, 2.4vw, 40px);
      }

      .answer-back{
        height:62px;
        font-size:clamp(20px, 2.2vw, 34px);
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <main class="shell">
      <section class="topbar">
        <div class="portrait-bar portrait-only">
          <div class="portrait-logo" aria-label="صندوق المسابقات">
            <img src="logo.PNG" alt="صندوق المسابقات">
          </div>

          <div class="strip-scores" aria-label="نتائج الفريقين">
            <div class="score-chip">
              <div class="score-chip-name" id="team1Name">الفريق الأول</div>
              <div class="score-chip-num"><span id="team1Score">0</span></div>
            </div>

            <div class="score-chip">
              <div class="score-chip-name" id="team2Name">الفريق الثاني</div>
              <div class="score-chip-num"><span id="team2Score">0</span></div>
            </div>
          </div>

          <div class="portrait-title" aria-hidden="true">
            <div class="game-logo">
              <span class="word-top">بدون</span>
              <span class="word-bottom">كلام</span>
            </div>
          </div>
        </div>

        <div class="topbar-land landscape-only">
          <div class="land-store-logo">
            <img src="logo.PNG" alt="صندوق المسابقات">
          </div>

          <div class="land-game-logo" aria-hidden="true">
            <div class="game-logo">
              <span class="word-top">بدون</span>
              <span class="word-bottom">كلام</span>
            </div>
          </div>

          <div class="land-duration-wrap">
            <button id="durationBtnLand" class="duration-btn" type="button">60 ثانية</button>

            <div id="durationMenuLand" class="duration-menu">
              <button class="duration-option" type="button" data-seconds="30">30 ثانية</button>
              <button class="duration-option active" type="button" data-seconds="60">60 ثانية</button>
              <button class="duration-option" type="button" data-seconds="90">90 ثانية</button>
              <button class="duration-option" type="button" data-seconds="120">120 ثانية</button>
            </div>
          </div>

          <div class="land-timer">
            <div class="timer-dock" aria-label="المؤقت">
              <button id="pauseResumeBtnLand" class="timer-control" type="button" aria-label="تشغيل أو إيقاف المؤقت">
                <svg class="play-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M8 6v12l10-6-10-6Z" fill="var(--green)" stroke="none"></path>
                </svg>
                <svg class="pause-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M9 6v12M15 6v12"></path>
                </svg>
              </button>

              <div class="timer-value" id="timerDisplayLand">01:00</div>

              <button id="resetTimerBtnLand" class="timer-control" type="button" aria-label="إعادة ضبط المؤقت">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M20 5v5h-5"></path>
                  <path d="M20 10a8 8 0 1 0 2 5.5"></path>
                </svg>
              </button>
            </div>
          </div>

          <div class="land-back">
            <button id="backBtnLandscape" class="back-btn" type="button">رجوع</button>
          </div>
        </div>
      </section>

      <div class="controls-row portrait-only">
        <div class="timer-cluster">
          <div class="timer-dock" aria-label="المؤقت">
            <button id="pauseResumeBtn" class="timer-control" type="button" aria-label="تشغيل أو إيقاف المؤقت">
              <svg class="play-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M8 6v12l10-6-10-6Z" fill="var(--green)" stroke="none"></path>
              </svg>
              <svg class="pause-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M9 6v12M15 6v12"></path>
              </svg>
            </button>

            <div class="timer-value" id="timerDisplay">01:00</div>

            <button id="resetTimerBtn" class="timer-control" type="button" aria-label="إعادة ضبط المؤقت">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M20 5v5h-5"></path>
                <path d="M20 10a8 8 0 1 0 2 5.5"></path>
              </svg>
            </button>
          </div>

          <button id="durationBtn" class="duration-btn" type="button">60 ثانية</button>

          <div id="durationMenu" class="duration-menu">
            <button class="duration-option" type="button" data-seconds="30">30 ثانية</button>
            <button class="duration-option active" type="button" data-seconds="60">60 ثانية</button>
            <button class="duration-option" type="button" data-seconds="90">90 ثانية</button>
            <button class="duration-option" type="button" data-seconds="120">120 ثانية</button>
          </div>
        </div>
      </div>

      <div class="content-layout">
        <aside class="land-sidebar landscape-only">
          <div class="team-stack">
            <div class="team-panel">
              <div class="team-panel-name" id="team1NameSide">الفريق الأول</div>
              <div class="team-panel-score" id="team1ScoreSide">0</div>
            </div>

            <div class="team-panel">
              <div class="team-panel-name" id="team2NameSide">الفريق الثاني</div>
              <div class="team-panel-score" id="team2ScoreSide">0</div>
            </div>
          </div>

          <div class="land-action-wrap">
            <button id="mainActionBtnLand" class="land-action-btn" type="button">ابدأ</button>
          </div>
        </aside>

        <section class="stage">
          <h2 class="barcode-title">امسح الـ <span class="ltr">QR</span> وحاول تشرح لفريقك بدون ولا كلمة</h2>

          <button class="poster-trigger" id="openPosterBtn" type="button" aria-label="تكبير الباركود">
            <div class="poster-card">
              <h3 class="poster-title">اقرأ القوانين بدقة وبعدها اضغط ابدأ!</h3>

              <ul class="poster-list">
                <li>١) لاعب واحد فقط يمسح الباركود ويشوف الجواب.</li>
                <li>٢) ممنوع أي شخص غيره يطلع على المحتوى.</li>
                <li>٣) الشرح يكون بالإشارات فقط بدون أي كلمة.</li>
                <li>٤) اضغط ابدأ بعد فتح الباركود ليبدأ المؤقت.</li>
              </ul>

              <div class="poster-qr-wrap">
                <img id="qrImageSmall" class="poster-qr" alt="باركود السؤال">
                <div class="poster-qr-text">امسح الباركود</div>
              </div>

              <img class="poster-boy" src="boy.PNG" alt="">

              <div class="poster-game-logo">
                <span class="word-top">بدون</span>
                <span class="word-bottom">كلام</span>
              </div>
            </div>
          </button>
        </section>
      </div>
    </main>

    <div class="bottom-bar">
      <button id="mainActionBtn" class="main-action" type="button">ابدأ</button>
    </div>
  </div>

  <div id="qrOnlyModal" class="overlay" aria-hidden="true">
    <img id="qrOnlyImage" class="qr-only" alt="باركود كبير">
  </div>

  <div id="answerModal" class="overlay" aria-hidden="true">
    <div class="answer-card">
      <div class="answer-top"></div>

      <div class="answer-content">
        <h3 class="answer-title">مين جاوب؟</h3>

        <div class="answer-options">
          <button id="answerTeam1" class="answer-btn" type="button">الفريق الأول</button>
          <button id="answerTeam2" class="answer-btn" type="button">الفريق الثاني</button>
          <button id="answerNone" class="answer-btn none" type="button">ولا أحد</button>
        </div>
      </div>

      <button id="answerBackBtn" class="answer-back" type="button">ارجع للباركود</button>
    </div>
  </div>

  <script>
    const team1NameEl = document.getElementById("team1Name");
    const team2NameEl = document.getElementById("team2Name");
    const team1ScoreEl = document.getElementById("team1Score");
    const team2ScoreEl = document.getElementById("team2Score");

    const team1NameLandEl = document.getElementById("team1NameSide");
    const team2NameLandEl = document.getElementById("team2NameSide");
    const team1ScoreLandEl = document.getElementById("team1ScoreSide");
    const team2ScoreLandEl = document.getElementById("team2ScoreSide");

    const timerDisplay = document.getElementById("timerDisplay");
    const timerDisplayLand = document.getElementById("timerDisplayLand");

    const durationBtn = document.getElementById("durationBtn");
    const durationBtnLand = document.getElementById("durationBtnLand");

    const durationMenu = document.getElementById("durationMenu");
    const durationMenuLand = document.getElementById("durationMenuLand");

    const durationOptions = Array.from(durationMenu.querySelectorAll(".duration-option"));
    const durationOptionsLand = Array.from(durationMenuLand.querySelectorAll(".duration-option"));

    const pauseResumeBtn = document.getElementById("pauseResumeBtn");
    const pauseResumeBtnLand = document.getElementById("pauseResumeBtnLand");

    const resetTimerBtn = document.getElementById("resetTimerBtn");
    const resetTimerBtnLand = document.getElementById("resetTimerBtnLand");

    const mainActionBtn = document.getElementById("mainActionBtn");
    const mainActionBtnLand = document.getElementById("mainActionBtnLand");
    const openPosterBtn = document.getElementById("openPosterBtn");

    const qrOnlyModal = document.getElementById("qrOnlyModal");
    const qrOnlyImage = document.getElementById("qrOnlyImage");

    const answerModal = document.getElementById("answerModal");
    const answerTeam1 = document.getElementById("answerTeam1");
    const answerTeam2 = document.getElementById("answerTeam2");
    const answerNone = document.getElementById("answerNone");
    const answerBackBtn = document.getElementById("answerBackBtn");

    const qrImageSmall = document.getElementById("qrImageSmall");
    const backBtnLandscape = document.getElementById("backBtnLandscape");

    let selectedDuration = Number(sessionStorage.getItem("bdonKalam_timerDuration") || 60);
    let remainingSeconds = selectedDuration;
    let timerInterval = null;
    let isRunning = false;
    let roundActive = false;

    function getStoredValue(keys, fallback) {
      for (const key of keys) {
        const value = sessionStorage.getItem(key) || localStorage.getItem(key);
        if (value && String(value).trim()) return String(value).trim();
      }
      return fallback;
    }

    function setText(el, value) {
      if (el) el.textContent = value;
    }

    function getPauseButtons() {
      return [pauseResumeBtn, pauseResumeBtnLand].filter(Boolean);
    }

    function getDurationButtons() {
      return [durationBtn, durationBtnLand].filter(Boolean);
    }

    function getActionButtons() {
      return [mainActionBtn, mainActionBtnLand].filter(Boolean);
    }

    function loadHeaderData() {
      const team1 = getStoredValue(
        ["bdonKalam_team1", "bdonKalam_team1Name", "team1", "team1Name"],
        "الفريق الأول"
      );

      const team2 = getStoredValue(
        ["bdonKalam_team2", "bdonKalam_team2Name", "team2", "team2Name"],
        "الفريق الثاني"
      );

      const score1 = Number(getStoredValue(["bdonKalam_score1", "team1Score"], "0")) || 0;
      const score2 = Number(getStoredValue(["bdonKalam_score2", "team2Score"], "0")) || 0;

      setText(team1NameEl, team1);
      setText(team2NameEl, team2);
      setText(team1ScoreEl, score1);
      setText(team2ScoreEl, score2);

      setText(team1NameLandEl, team1);
      setText(team2NameLandEl, team2);
      setText(team1ScoreLandEl, score1);
      setText(team2ScoreLandEl, score2);

      setText(answerTeam1, team1);
      setText(answerTeam2, team2);
    }

    function updateScore(teamKey) {
      const current1 = Number(sessionStorage.getItem("bdonKalam_score1") || "0") || 0;
      const current2 = Number(sessionStorage.getItem("bdonKalam_score2") || "0") || 0;

      const next1 = teamKey === "team1" ? current1 + 1 : current1;
      const next2 = teamKey === "team2" ? current2 + 1 : current2;

      sessionStorage.setItem("bdonKalam_score1", String(next1));
      sessionStorage.setItem("bdonKalam_score2", String(next2));

      setText(team1ScoreEl, next1);
      setText(team2ScoreEl, next2);
      setText(team1ScoreLandEl, next1);
      setText(team2ScoreLandEl, next2);
    }

    function formatTime(totalSeconds) {
      const mins = Math.floor(totalSeconds / 60);
      const secs = totalSeconds % 60;
      return `${String(mins).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;
    }

    function updateTimerDisplay() {
      const formatted = formatTime(remainingSeconds);
      setText(timerDisplay, formatted);
      setText(timerDisplayLand, formatted);

      getPauseButtons().forEach(btn => {
        btn.classList.toggle("playing", isRunning);
      });
    }

    function syncDurationButtons() {
      getDurationButtons().forEach(btn => {
        setText(btn, `${selectedDuration} ثانية`);
      });

      durationOptions.forEach(btn => {
        btn.classList.toggle("active", Number(btn.dataset.seconds) === selectedDuration);
      });

      durationOptionsLand.forEach(btn => {
        btn.classList.toggle("active", Number(btn.dataset.seconds) === selectedDuration);
      });
    }

    function syncActionButton() {
      const text = roundActive ? "مين جاوب؟" : "ابدأ";
      getActionButtons().forEach(btn => {
        btn.textContent = text;
        btn.classList.toggle("alt", roundActive);
      });
    }

    function setDurationButtonsEnabled(enabled) {
      getDurationButtons().forEach(btn => {
        btn.disabled = !enabled;
        btn.style.opacity = enabled ? "" : ".7";
        btn.style.cursor = enabled ? "" : "not-allowed";
      });
    }

    function hardResetTimer(resetRound = true) {
      clearInterval(timerInterval);
      timerInterval = null;
      isRunning = false;
      remainingSeconds = selectedDuration;
      updateTimerDisplay();
      setDurationButtonsEnabled(true);

      if (resetRound) {
        roundActive = false;
        syncActionButton();
      }
    }

    function startTimer() {
      if (isRunning) return;

      roundActive = true;
      isRunning = true;
      syncActionButton();
      setDurationButtonsEnabled(false);
      updateTimerDisplay();

      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        remainingSeconds -= 1;
        if (remainingSeconds <= 0) {
          remainingSeconds = 0;
          clearInterval(timerInterval);
          timerInterval = null;
          isRunning = false;
          updateTimerDisplay();
          return;
        }
        updateTimerDisplay();
      }, 1000);
    }

    function togglePauseResume() {
      if (!roundActive) return;

      if (isRunning) {
        clearInterval(timerInterval);
        timerInterval = null;
        isRunning = false;
        updateTimerDisplay();
        return;
      }

      if (remainingSeconds <= 0) return;

      isRunning = true;
      updateTimerDisplay();

      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        remainingSeconds -= 1;
        if (remainingSeconds <= 0) {
          remainingSeconds = 0;
          clearInterval(timerInterval);
          timerInterval = null;
          isRunning = false;
          updateTimerDisplay();
          return;
        }
        updateTimerDisplay();
      }, 1000);
    }

    function openAnswerModal() {
      answerModal.classList.add("show");
      answerModal.setAttribute("aria-hidden", "false");
    }

    function closeAnswerModal() {
      answerModal.classList.remove("show");
      answerModal.setAttribute("aria-hidden", "true");
    }

    function openQrOnlyModal() {
      qrOnlyModal.classList.add("show");
      qrOnlyModal.setAttribute("aria-hidden", "false");
    }

    function closeQrOnlyModal() {
      qrOnlyModal.classList.remove("show");
      qrOnlyModal.setAttribute("aria-hidden", "true");
    }

    function goBackToNumbers() {
      window.location.href = "numbers.html";
    }

    function finishRound(scoredTeam = "") {
      if (scoredTeam === "team1" || scoredTeam === "team2") {
        updateScore(scoredTeam);
      }
      closeAnswerModal();
      hardResetTimer(true);
      goBackToNumbers();
    }

    function buildRevealUrl() {
      const categoryKey = sessionStorage.getItem("bdonKalam_categoryKey") || "default";
      const categoryName = sessionStorage.getItem("bdonKalam_categoryName") || "";
      const selectedNumber = sessionStorage.getItem("bdonKalam_selectedNumber") || "1";

      const revealUrl = new URL("reveal.html", window.location.href);
      revealUrl.searchParams.set("cat", categoryKey);
      revealUrl.searchParams.set("catName", categoryName);
      revealUrl.searchParams.set("num", selectedNumber);
      return revealUrl.toString();
    }

    function renderQr() {
      const revealUrl = buildRevealUrl();
      const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=640x640&data=${encodeURIComponent(revealUrl)}`;
      qrImageSmall.src = qrUrl;
      qrOnlyImage.src = qrUrl;
    }

    function bindDurationMenu(button, menu, options) {
      button.addEventListener("click", () => {
        if (button.disabled) return;
        menu.classList.toggle("show");
      });

      options.forEach(btn => {
        btn.addEventListener("click", () => {
          selectedDuration = Number(btn.dataset.seconds) || 60;
          sessionStorage.setItem("bdonKalam_timerDuration", String(selectedDuration));
          remainingSeconds = selectedDuration;
          syncDurationButtons();
          updateTimerDisplay();
          durationMenu.classList.remove("show");
          durationMenuLand.classList.remove("show");
        });
      });
    }

    bindDurationMenu(durationBtn, durationMenu, durationOptions);
    bindDurationMenu(durationBtnLand, durationMenuLand, durationOptionsLand);

    document.addEventListener("click", (e) => {
      const clickInsidePortrait = durationMenu.contains(e.target) || e.target === durationBtn;
      const clickInsideLand = durationMenuLand.contains(e.target) || e.target === durationBtnLand;
      if (!clickInsidePortrait) durationMenu.classList.remove("show");
      if (!clickInsideLand) durationMenuLand.classList.remove("show");
    });

    getPauseButtons().forEach(btn => btn.addEventListener("click", togglePauseResume));
    [resetTimerBtn, resetTimerBtnLand].forEach(btn => btn.addEventListener("click", () => hardResetTimer(true)));

    openPosterBtn.addEventListener("click", openQrOnlyModal);
    qrOnlyModal.addEventListener("click", closeQrOnlyModal);

    getActionButtons().forEach(btn => {
      btn.addEventListener("click", () => {
        if (!roundActive) {
          startTimer();
          return;
        }
        openAnswerModal();
      });
    });

    answerTeam1.addEventListener("click", () => finishRound("team1"));
    answerTeam2.addEventListener("click", () => finishRound("team2"));
    answerNone.addEventListener("click", () => finishRound(""));
    answerBackBtn.addEventListener("click", closeAnswerModal);

    answerModal.addEventListener("click", (e) => {
      if (e.target === answerModal) closeAnswerModal();
    });

    backBtnLandscape.addEventListener("click", goBackToNumbers);

    loadHeaderData();
    syncDurationButtons();
    syncActionButton();
    updateTimerDisplay();
    renderQr();
  </script>
</body>
</html>
