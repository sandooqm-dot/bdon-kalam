<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>لعبة بدون كلام - الأرقام</title>

  <style id="auth-gate-style">
    body{visibility:hidden !important;}
  </style>
  <script>
    (function () {
      const ACTIVATE_URL = "activate.html";
      const API_ME_URL = window.location.origin + "/api/me";
      const HIDE_STYLE_ID = "auth-gate-style";

      const TOKEN_KEYS = [
        "bdonKalam_token_v1",
        "bdonKalam_token",
        "sandooq_token_v1",
        "sandooq_token",
        "token"
      ];

      const EMAIL_KEYS = [
        "bdonKalam_email_v1",
        "bdonKalam_email",
        "sandooq_email",
        "user_email",
        "email"
      ];

      function readAny(keys) {
        for (const key of keys) {
          try {
            const value = localStorage.getItem(key) || sessionStorage.getItem(key);
            if (value && String(value).trim()) return String(value).trim();
          } catch (_) {}
        }
        return "";
      }

      function writeSafe(key, value) {
        if (!value) return;
        try { localStorage.setItem(key, value); } catch (_) {}
        try { sessionStorage.setItem(key, value); } catch (_) {}
      }

      function revealPage() {
        const gateStyle = document.getElementById(HIDE_STYLE_ID);
        if (gateStyle) gateStyle.remove();
      }

      function redirectToActivate() {
        location.replace(ACTIVATE_URL);
      }

      function isActivated(data) {
        return !!(
          data?.activated === true ||
          data?.is_activated === true ||
          data?.isActivated === true ||
          data?.user?.activated === true ||
          data?.user?.is_activated === true ||
          data?.user?.isActivated === true ||
          data?.status === "activated"
        );
      }

      async function checkAuthGate() {
        const token = readAny(TOKEN_KEYS);
        if (!token) {
          redirectToActivate();
          return;
        }

        try {
          const response = await fetch(API_ME_URL, {
            method: "GET",
            headers: {
              Authorization: "Bearer " + token
            },
            cache: "no-store"
          });

          let data = {};
          try {
            data = await response.json();
          } catch (_) {}

          if (!response.ok || !isActivated(data)) {
            redirectToActivate();
            return;
          }

          const email = String(
            data?.email ||
            data?.user?.email ||
            readAny(EMAIL_KEYS) ||
            ""
          ).trim().toLowerCase();

          if (email) {
            writeSafe("bdonKalam_email_v1", email);
          }

          if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", revealPage, { once: true });
          } else {
            revealPage();
          }
        } catch (_) {
          redirectToActivate();
        }
      }

      checkAuthGate();
    })();
  </script>

  <style>
    @font-face{
      font-family:"Estedad";
      src:url("Estedad-Bold.ttf") format("truetype");
      font-style:normal;
      font-weight:700;
      font-display:swap;
    }

    :root{
      --bg:#f7efd8;
      --dot:#e7d8ae;
      --ink:#18131d;
      --white:#fffdf7;

      --panel:#f8efd6;
      --panel-2:#f0e0b9;

      --gold:#f2b84a;
      --gold-dark:#d9981e;

      --blue:#8ecbff;
      --blue-2:#67b8ff;

      --line:#1d1922;
      --safe-bottom: env(safe-area-inset-bottom, 0px);

      --board-max-p: 980px;
      --board-max-l: 1780px;

      --footer-space-p: 112px;
      --footer-space-l: 96px;

      --back-size-p: 82px;
      --back-left-p: 18px;
      --back-bottom-p: 18px;

      --back-size-l: 70px;
      --back-left-l: 20px;
      --back-bottom-l: 14px;

      --numbers-pad-p: 16px;
      --numbers-pad-l: 14px;
      --numbers-gap-p: 12px;
      --numbers-gap-l: 12px;

      --tile-size-font-p: 31px;
      --tile-size-font-l: 24px;
      --tile-radius-p: 24px;
      --tile-radius-l: 20px;

      --tile-bg:#f2b84a;
      --tile-bg-2:#d9981e;
      --tile-text:#fffdf7;
      --tile-opened:#a9784c;
      --tile-opened-2:#8f6a47;
      --tile-opened-text:#fffdf7;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
      font-family:"Estedad", Tahoma, Arial, "Segoe UI", sans-serif;
    }

    html,body{
      margin:0;
      min-height:100%;
      background:var(--bg);
      color:var(--ink);
    }

    body{
      min-height:100vh;
      overflow-x:hidden;
    }

    .page{
      position:relative;
      min-height:100dvh;
      overflow-x:hidden;
      overflow-y:auto;
      padding:14px 14px calc(var(--footer-space-p) + var(--safe-bottom));
      background:
        radial-gradient(circle at 18% 18%, rgba(255,255,255,.34), transparent 18%),
        radial-gradient(circle at 83% 16%, rgba(255,255,255,.22), transparent 18%),
        radial-gradient(circle at 62% 82%, rgba(255,255,255,.16), transparent 20%),
        linear-gradient(180deg, var(--bg), #f9f1dc 100%);
    }

    .page::before{
      content:"";
      position:absolute;
      inset:-180px;
      background-image:radial-gradient(var(--dot) 34%, transparent 36%);
      background-size:36px 36px;
      opacity:.68;
      animation:patternDiagonal 8s linear infinite;
      pointer-events:none;
      z-index:0;
    }

    .page::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(135deg, rgba(255,255,255,.08) 0%, transparent 30%),
        linear-gradient(315deg, rgba(255,255,255,.05) 0%, transparent 24%);
      pointer-events:none;
      z-index:0;
    }

    .floaters{
      position:absolute;
      inset:0;
      z-index:0;
      pointer-events:none;
      overflow:hidden;
    }

    .floater{
      position:absolute;
      border-radius:50%;
      animation:floaty 4.4s ease-in-out infinite;
      opacity:.5;
    }

    .floater.f1{
      width:14px;
      height:14px;
      top:15%;
      left:10%;
      background:#fff;
      box-shadow:0 0 0 5px rgba(255,255,255,.18);
    }

    .floater.f2{
      width:10px;
      height:10px;
      top:42%;
      left:8%;
      background:#fff;
      box-shadow:0 0 0 4px rgba(255,255,255,.12);
      animation-delay:-1s;
    }

    .floater.f3{
      width:12px;
      height:12px;
      bottom:17%;
      right:14%;
      background:#fff6cc;
      box-shadow:0 0 0 4px rgba(255,246,204,.18);
      animation-delay:-2s;
    }

    .floater.f4{
      width:9px;
      height:9px;
      top:28%;
      right:12%;
      background:#fff;
      box-shadow:0 0 0 3px rgba(255,255,255,.12);
      animation-delay:-3s;
    }

    .shell{
      width:min(100%, var(--board-max-p));
      margin:0 auto;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:16px;
      padding-top:18px;
      position:relative;
      z-index:2;
    }

    .top-strip{
      width:min(100%, 960px);
      min-height:108px;
      background:linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
      border:4px solid var(--line);
      border-radius:34px;
      box-shadow:0 10px 0 rgba(0,0,0,.28);
      padding:14px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
    }

    .strip-title{
      min-width:140px;
      display:flex;
      justify-content:flex-start;
      align-items:center;
    }

    .strip-title-text{
      display:inline-flex;
      flex-direction:column;
      align-items:center;
      line-height:.84;
      color:#11101a;
      font-size:clamp(34px, 6vw, 54px);
      letter-spacing:-.5px;
      transform:rotate(-6deg);
      text-shadow:
        -4px -4px 0 #fff,
         4px -4px 0 #fff,
        -4px  4px 0 #fff,
         4px  4px 0 #fff,
         0   -4px 0 #fff,
         0    4px 0 #fff,
        -4px  0   0 #fff,
         4px  0   0 #fff,
         0    7px 0 rgba(0,0,0,.05);
      filter:drop-shadow(0 6px 0 rgba(0,0,0,.04));
      user-select:none;
      pointer-events:none;
    }

    .strip-title-text .word-top{
      transform:translateY(-6px);
    }

    .strip-title-text .word-bottom{
      transform:translateY(2px);
    }

    .strip-scores{
      flex:1 1 auto;
      min-width:0;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .score-chip{
      min-width:150px;
      max-width:260px;
      min-height:58px;
      padding:8px 12px;
      border-radius:22px;
      border:3px solid var(--line);
      background:linear-gradient(180deg, #fffdf8 0%, #f4ecd0 100%);
      box-shadow:0 6px 0 rgba(0,0,0,.18);
      display:flex;
      align-items:center;
      gap:10px;
      justify-content:space-between;
    }

    .score-chip-name{
      flex:1 1 auto;
      min-width:0;
      color:#173e73;
      font-size:22px;
      line-height:1.15;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      text-align:right;
      display:flex;
      align-items:center;
      min-height:100%;
      transform:translateY(-1px);
    }

    .score-chip-num{
      width:38px;
      height:38px;
      border-radius:14px;
      border:3px solid var(--line);
      background:var(--gold);
      box-shadow:0 4px 0 rgba(0,0,0,.16);
      color:#3f2b0c;
      display:flex;
      align-items:center;
      justify-content:center;
      flex:0 0 auto;
      padding:0;
      direction:ltr;
      text-align:center;
      line-height:1;
      font-weight:700;
      font-variant-numeric:tabular-nums;
    }

    .score-chip-num span{
      display:block;
      line-height:1;
    }

    .strip-logo{
      min-width:110px;
      display:flex;
      justify-content:flex-end;
      align-items:center;
      user-select:none;
      pointer-events:none;
      filter:drop-shadow(0 4px 0 rgba(255,255,255,.38));
    }

    .strip-logo img{
      width:min(146px, 30vw);
      height:auto;
      display:block;
    }

    .numbers-wrap{
      width:min(100%, 960px);
      background:linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
      border:4px solid var(--line);
      border-radius:34px;
      box-shadow:0 10px 0 rgba(0,0,0,.28);
      padding:var(--numbers-pad-p);
    }

    .numbers-board{
      display:grid;
      grid-template-columns:repeat(5, minmax(0, 1fr));
      gap:var(--numbers-gap-p);
      direction:rtl;
    }

    .num-btn{
      appearance:none;
      border:none;
      border-radius:var(--tile-radius-p);
      border:5px solid #000;
      background:linear-gradient(180deg, var(--tile-bg) 0%, var(--tile-bg-2) 100%);
      box-shadow:0 7px 0 rgba(0,0,0,.26);
      color:var(--tile-text);
      aspect-ratio:1/1;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      font-size:clamp(28px, 6vw, var(--tile-size-font-p));
      line-height:1;
      cursor:pointer;
      transition:transform .12s ease, filter .12s ease, background .12s ease, color .12s ease;
      user-select:none;
      text-shadow:0 3px 0 rgba(0,0,0,.16);
    }

    .num-btn:active{
      transform:translateY(2px) scale(.99);
    }

    .num-btn.opened{
      background:linear-gradient(180deg, var(--tile-opened) 0%, var(--tile-opened-2) 100%);
      color:var(--tile-opened-text);
      text-shadow:0 3px 0 rgba(0,0,0,.22);
      filter:saturate(.72);
    }

    .bottom-bar{
      position:fixed;
      left:0;
      right:0;
      bottom:var(--safe-bottom);
      height:var(--footer-space-p);
      pointer-events:none;
      z-index:35;
    }

    .back-btn{
      position:absolute;
      left:var(--back-left-p);
      bottom:var(--back-bottom-p);
      width:var(--back-size-p);
      height:var(--back-size-p);
      border:none;
      border-radius:50%;
      border:6px solid #000;
      background:linear-gradient(180deg, var(--blue) 0%, var(--blue-2) 100%);
      box-shadow:0 8px 0 rgba(0,0,0,.28);
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      pointer-events:auto;
      transition:transform .12s ease;
      padding:0;
    }

    .back-btn:active{
      transform:translateY(2px) scale(.99);
    }

    .back-btn svg{
      width:34px;
      height:34px;
      stroke:#111;
      fill:none;
      stroke-width:2.8;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    @keyframes patternDiagonal{
      from{ background-position:0 0; }
      to{ background-position:92px -92px; }
    }

    @keyframes floaty{
      0%,100%{ transform:translateY(0); }
      50%{ transform:translateY(-10px); }
    }

    @media (max-width:700px){
      .page{
        padding:12px 12px calc(var(--footer-space-p) + var(--safe-bottom));
      }

      .shell{
        gap:14px;
        padding-top:14px;
      }

      .top-strip{
        padding:14px 12px;
        border-radius:28px;
        gap:10px;
      }

      .strip-title{
        min-width:106px;
      }

      .strip-title-text{
        font-size:clamp(26px, 6vw, 42px);
      }

      .strip-scores{
        gap:8px;
      }

      .score-chip{
        min-width:126px;
        min-height:52px;
        padding:6px 10px;
      }

      .score-chip-name{
        font-size:18px;
      }

      .score-chip-num{
        width:34px;
        height:34px;
        font-size:18px;
      }

      .strip-logo{
        min-width:76px;
      }

      .strip-logo img{
        width:min(110px, 24vw);
      }

      .numbers-wrap{
        padding:14px 12px;
        border-radius:28px;
      }

      .numbers-board{
        gap:12px;
      }

      .num-btn{
        border-width:5px;
      }
    }

    @media (orientation:landscape){
      .page{
        padding:10px 14px calc(var(--footer-space-l) + var(--safe-bottom));
      }

      .shell{
        width:min(100%, var(--board-max-l));
        gap:12px;
        padding-top:16px;
      }

      .top-strip,
      .numbers-wrap{
        width:min(100%, 1780px);
      }

      .top-strip{
        min-height:88px;
        padding:10px 16px;
        border-radius:30px;
      }

      .strip-title{
        min-width:120px;
      }

      .strip-title-text{
        font-size:34px;
      }

      .strip-logo img{
        width:104px;
      }

      .score-chip{
        min-width:132px;
        max-width:220px;
        min-height:48px;
        border-width:3px;
        box-shadow:0 5px 0 rgba(0,0,0,.16);
      }

      .score-chip-name{
        font-size:18px;
      }

      .score-chip-num{
        width:32px;
        height:32px;
        font-size:16px;
      }

      .numbers-wrap{
        padding:var(--numbers-pad-l);
        border-radius:30px;
      }

      .numbers-board{
        grid-template-columns:repeat(10, minmax(0, 1fr));
        gap:var(--numbers-gap-l);
      }

      .num-btn{
        border-radius:var(--tile-radius-l);
        font-size:min(var(--tile-size-font-l), 1.95vw);
        border-width:4px;
        box-shadow:0 5px 0 rgba(0,0,0,.24);
      }

      .bottom-bar{
        height:var(--footer-space-l);
      }

      .back-btn{
        left:var(--back-left-l);
        bottom:var(--back-bottom-l);
        width:var(--back-size-l);
        height:var(--back-size-l);
        border-width:4px;
        box-shadow:0 5px 0 rgba(0,0,0,.24);
      }

      .back-btn svg{
        width:30px;
        height:30px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="floaters" aria-hidden="true">
      <span class="floater f1"></span>
      <span class="floater f2"></span>
      <span class="floater f3"></span>
      <span class="floater f4"></span>
    </div>

    <main class="shell">
      <section class="top-strip" aria-label="معلومات اللعبة">
        <div class="strip-title" aria-hidden="true">
          <div class="strip-title-text">
            <span class="word-top">بدون</span>
            <span class="word-bottom">كلام</span>
          </div>
        </div>

        <div class="strip-scores" aria-label="نتائج الفريقين">
          <div class="score-chip">
            <div class="score-chip-name" id="team1Name">الفريق الأول</div>
            <div class="score-chip-num"><span id="team1Score">0</span></div>
          </div>

          <div class="score-chip">
            <div class="score-chip-name" id="team2Name">الفريق الثاني</div>
            <div class="score-chip-num"><span id="team2Score">0</span></div>
          </div>
        </div>

        <div class="strip-logo" aria-label="صندوق المسابقات">
          <img src="logo.PNG" alt="صندوق المسابقات">
        </div>
      </section>

      <section class="numbers-wrap" aria-label="أرقام اللعبة">
        <div class="numbers-board" id="numbersBoard"></div>
      </section>
    </main>

    <div class="bottom-bar">
      <button class="back-btn" id="backBtn" type="button" aria-label="الرجوع للكتاغوريات" title="الرجوع للكتاغوريات">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M15 5 8 12l7 7"></path>
        </svg>
      </button>
    </div>
  </div>

  <script>
    const BARCODE_PAGE = "barcode.html";
    const OPENED_STORAGE_KEY = "bdonKalam_openedNumbers_session_v1";

    const board = document.getElementById("numbersBoard");
    const backBtn = document.getElementById("backBtn");

    const team1NameEl = document.getElementById("team1Name");
    const team2NameEl = document.getElementById("team2Name");
    const team1ScoreEl = document.getElementById("team1Score");
    const team2ScoreEl = document.getElementById("team2Score");

    function getStoredValue(keys, fallback) {
      for (const key of keys) {
        const value = sessionStorage.getItem(key) || localStorage.getItem(key);
        if (value && String(value).trim()) return String(value).trim();
      }
      return fallback;
    }

    function loadHeaderData() {
      const team1 = getStoredValue(
        ["bdonKalam_team1", "bdonKalam_team1Name", "team1", "team1Name"],
        "الفريق الأول"
      );

      const team2 = getStoredValue(
        ["bdonKalam_team2", "bdonKalam_team2Name", "team2", "team2Name"],
        "الفريق الثاني"
      );

      const score1 = getStoredValue(
        ["bdonKalam_score1", "team1Score"],
        "0"
      );

      const score2 = getStoredValue(
        ["bdonKalam_score2", "team2Score"],
        "0"
      );

      team1NameEl.textContent = team1;
      team2NameEl.textContent = team2;
      team1ScoreEl.textContent = score1;
      team2ScoreEl.textContent = score2;
    }

    const categoryKey = sessionStorage.getItem("bdonKalam_categoryKey") || "default";
    const categoryName = sessionStorage.getItem("bdonKalam_categoryName") || "";

    function readOpenedMap() {
      try {
        return JSON.parse(sessionStorage.getItem(OPENED_STORAGE_KEY) || "{}");
      } catch {
        return {};
      }
    }

    function writeOpenedMap(map) {
      sessionStorage.setItem(OPENED_STORAGE_KEY, JSON.stringify(map));
    }

    function getOpenedSet() {
      const map = readOpenedMap();
      const list = Array.isArray(map[categoryKey]) ? map[categoryKey] : [];
      return new Set(list.map(Number));
    }

    function markOpened(num) {
      const map = readOpenedMap();
      const list = Array.isArray(map[categoryKey]) ? map[categoryKey].map(Number) : [];
      if (!list.includes(num)) list.push(num);
      map[categoryKey] = list;
      writeOpenedMap(map);
    }

    function openBarcode(num) {
      sessionStorage.setItem("bdonKalam_selectedNumber", String(num));
      markOpened(num);

      const url =
        `${BARCODE_PAGE}?cat=${encodeURIComponent(categoryKey)}&catName=${encodeURIComponent(categoryName)}&num=${encodeURIComponent(num)}`;

      window.location.href = url;
    }

    function renderNumbers() {
      const opened = getOpenedSet();
      board.innerHTML = "";

      for (let i = 1; i <= 30; i++) {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "num-btn";
        if (opened.has(i)) btn.classList.add("opened");
        btn.textContent = i;
        btn.setAttribute("aria-label", `الرقم ${i}`);
        btn.addEventListener("click", () => openBarcode(i));
        board.appendChild(btn);
      }
    }

    backBtn.addEventListener("click", () => {
      window.location.href = "categories.html";
    });

    loadHeaderData();
    renderNumbers();
  </script>
</body>
</html>
